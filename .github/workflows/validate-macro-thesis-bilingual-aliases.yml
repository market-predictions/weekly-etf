name: Validate macro thesis bilingual aliases

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-aliases:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip pytest
      - run: pytest tests/test_macro_thesis_bilingual_aliases.py
      - run: python tools/validate_macro_thesis_bilingual_aliases.py
