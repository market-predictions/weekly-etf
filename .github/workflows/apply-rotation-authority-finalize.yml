name: Apply rotation authority finalizer

on:
  push:
    branches:
      - agent/fix-current-run-rotation-authority
    paths:
      - "tools/apply_rotation_authority_finalize.py"
      - ".github/workflows/apply-rotation-authority-finalize.yml"

permissions:
  contents: write

jobs:
  apply:
    if: ${{ !contains(github.event.head_commit.message, '[rotation-authority-finalize]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/fix-current-run-rotation-authority
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Apply deterministic source patch
        run: python tools/apply_rotation_authority_finalize.py

      - name: Validate patched implementation
        run: |
          python -m py_compile \
            runtime/rotation_state_authority.py \
            runtime/portfolio_rotation_engine_v2.py \
            runtime/portfolio_rotation_engine.py
          python -m pip install pytest
          python -m pytest -q tests/test_etf_rotation_state_authority.py

      - name: Remove one-shot finalizer
        run: |
          rm tools/apply_rotation_authority_finalize.py
          rm .github/workflows/apply-rotation-authority-finalize.yml

      - name: Commit and push final patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add runtime/rotation_state_authority.py runtime/portfolio_rotation_engine_v2.py tests/test_etf_rotation_state_authority.py
          git add -u tools/apply_rotation_authority_finalize.py .github/workflows/apply-rotation-authority-finalize.yml
          git commit -m "Finalize rotation authority and destination ranking [rotation-authority-finalize]"
          git push origin HEAD:agent/fix-current-run-rotation-authority
