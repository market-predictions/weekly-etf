name: Patch fresh report delivery request authority

on:
  push:
    branches:
      - agent/fresh-report-delivery-request-authority
    paths:
      - "tools/patch_fresh_report_delivery_request_authority.py"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/fresh-report-delivery-request-authority
          fetch-depth: 0

      - name: Apply deterministic patch
        run: python tools/patch_fresh_report_delivery_request_authority.py

      - name: Commit patched files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add report-request execution authority gate" || exit 0
          git push origin HEAD:agent/fresh-report-delivery-request-authority
