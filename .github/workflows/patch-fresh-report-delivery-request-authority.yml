name: Patch fresh report delivery request authority

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/patch-fresh-report-delivery-request-authority.yml"
      - "tools/patch_fresh_report_delivery_request_authority.py"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: .
    steps:
      - name: Check out implementation branch
        uses: actions/checkout@v4
        with:
          ref: agent/fresh-report-delivery-authority-pr
          fetch-depth: 0

      - name: Apply deterministic patch
        run: python tools/patch_fresh_report_delivery_request_authority.py

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install focused test dependency
        run: python -m pip install pytest

      - name: Compile and validate authority patch
        run: |
          python -m py_compile \
            runtime/model_execution_guarded_auto.py \
            tests/test_model_execution_request_authority.py
          pytest -q \
            tests/test_model_execution_request_authority.py \
            tests/test_model_no_trade_gate.py

      - name: Commit validated patch to implementation branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add report-request execution authority gate" || exit 0
          git push origin HEAD:agent/fresh-report-delivery-authority-pr
