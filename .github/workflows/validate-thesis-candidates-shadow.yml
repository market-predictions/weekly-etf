name: Validate ETF thesis candidates shadow

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "config/driver_catalog.yml"
      - "config/driver_beneficiary_map.yml"
      - "runtime/build_thesis_candidates.py"
      - "tools/write_thesis_candidates_validation_evidence.py"
      - "fixtures/thesis_candidates/**"
      - ".github/workflows/validate-thesis-candidates-shadow.yml"

permissions:
  contents: write

jobs:
  validate-thesis-candidates-shadow:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Validate AI grid defense fixture
        run: |
          python runtime/build_thesis_candidates.py \
            --macro-pack fixtures/thesis_candidates/macro_pack_ai_grid_defense.json \
            --reference-date 2026-06-01 \
            --run-id fixture_ai_grid_defense \
            --validate-only \
            --expect-driver ai_compute_capex \
            --expect-driver grid_power_demand \
            --expect-driver defense_resilience

      - name: Validate China commodity fixture
        run: |
          python runtime/build_thesis_candidates.py \
            --macro-pack fixtures/thesis_candidates/macro_pack_china_commodity.json \
            --reference-date 2026-06-01 \
            --run-id fixture_china_commodity \
            --validate-only \
            --expect-driver china_policy_recovery \
            --expect-driver non_us_developed_diversification \
            --expect-driver commodity_inflation_hedge

      - name: Build current shadow thesis candidates artifact
        run: |
          python runtime/build_thesis_candidates.py \
            --macro-pack output/macro/latest.json \
            --reference-date 2026-05-29 \
            --run-id shadow_validation

      - name: Write thesis candidates validation evidence
        run: |
          python tools/write_thesis_candidates_validation_evidence.py \
            --artifact output/macro/latest_thesis_candidates.json \
            --output-dir output/macro/validation \
            --workflow-name "${{ github.workflow }}" \
            --workflow-run-id "${{ github.run_id }}" \
            --workflow-run-number "${{ github.run_number }}" \
            --workflow-attempt "${{ github.run_attempt }}" \
            --commit-sha "${{ github.sha }}" \
            --source-ref "${{ github.ref_name }}"

      - name: Commit thesis candidate validation evidence
        if: github.event_name != 'pull_request'
        run: |
          if [ -z "$(git status --porcelain -- output/macro/validation/*thesis_candidates*.json)" ]; then
            echo "ETF_THESIS_CANDIDATES_EVIDENCE_NO_CHANGE"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/macro/validation/*thesis_candidates*.json
          git commit -m "record thesis candidate shadow validation evidence [skip ci]"
          git push
