name: Validate ETF rotation state authority

on:
  pull_request:
    branches:
      - main
    paths:
      - "runtime/portfolio_rotation_engine.py"
      - "runtime/portfolio_rotation_engine_v2.py"
      - "runtime/rotation_state_authority.py"
      - "tools/validate_etf_rotation_state_authority.py"
      - "tests/test_etf_rotation_state_authority.py"
      - "tools/apply_rotation_authority_finalize.py"
      - "tools/fix_rotation_authority_finalize_newlines.py"
      - ".github/workflows/apply-rotation-authority-finalize.yml"
      - ".github/workflows/validate-etf-rotation-state-authority.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Apply staged final authority patch when present
        id: finalize
        run: |
          if test -f tools/apply_rotation_authority_finalize.py; then
            python tools/apply_rotation_authority_finalize.py
            python tools/fix_rotation_authority_finalize_newlines.py
            echo "applied=true" >> "$GITHUB_OUTPUT"
          else
            echo "applied=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install test dependency
        run: python -m pip install pytest

      - name: Compile authority implementation
        run: |
          python -m py_compile \
            runtime/rotation_state_authority.py \
            runtime/portfolio_rotation_engine_v2.py \
            runtime/portfolio_rotation_engine.py \
            tools/validate_etf_rotation_state_authority.py

      - name: Run focused regression suite
        run: python -m pytest -q tests/test_etf_rotation_state_authority.py

      - name: Rebuild July production rotation plan in dry-run mode
        run: |
          python -m runtime.portfolio_rotation_engine \
            --portfolio-state output/etf_portfolio_state.json \
            --scorecard output/etf_recommendation_scorecard.csv \
            --pricing-audit output/pricing/price_audit_2026-07-14_20260715_164128.json \
            --lane-artifact output/lane_reviews/etf_lane_assessment_260714.json \
            --relative-strength output/market_history/etf_relative_strength.json \
            --run-id 20260715_authority_validation \
            --dry-run > /tmp/etf_rotation_plan.json
          python tools/validate_etf_rotation_state_authority.py \
            --plan /tmp/etf_rotation_plan.json

      - name: Assert exact corrected July mutation and authority proof
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          plan = json.loads(Path('/tmp/etf_rotation_plan.json').read_text(encoding='utf-8'))
          authority = plan.get('state_authority_validation', {}) or {}
          if authority.get('validated_holding_count') != 9:
              raise SystemExit(f"Expected 9 validated holdings, got {authority.get('validated_holding_count')}")
          if authority.get('average_entry_authority_complete') is not True:
              raise SystemExit('Average-entry authority is incomplete')
          intents = plan.get('trade_intents', []) or []
          if len(intents) != 1:
              raise SystemExit(f'Expected exactly one mutation intent, got {len(intents)}')
          first = intents[0]
          expected = ('URNM', 'XBI', -5.0)
          actual = (
              first.get('source_ticker'),
              first.get('destination_ticker'),
              float(first.get('delta_weight_pct') or 0.0),
          )
          if actual != expected:
              raise SystemExit(f'Expected mutation {expected}, got {actual}')
          print(
              'ETF_ROTATION_MUTATION_PROOF_OK | '
              f"source={actual[0]} | destination={actual[1]} | delta={actual[2]} | "
              f"holdings={authority.get('validated_holding_count')}"
          )
          PY

      - name: Upload corrected July rotation plan evidence
        uses: actions/upload-artifact@v4
        with:
          name: corrected-july-rotation-plan
          path: /tmp/etf_rotation_plan.json
          if-no-files-found: error
          retention-days: 30

      - name: Commit validated staged patch
        if: steps.finalize.outputs.applied == 'true'
        run: |
          rm -f tools/apply_rotation_authority_finalize.py
          rm -f tools/fix_rotation_authority_finalize_newlines.py
          rm -f .github/workflows/apply-rotation-authority-finalize.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add runtime/rotation_state_authority.py runtime/portfolio_rotation_engine_v2.py tests/test_etf_rotation_state_authority.py
          git add -u tools/apply_rotation_authority_finalize.py tools/fix_rotation_authority_finalize_newlines.py .github/workflows/apply-rotation-authority-finalize.yml
          git commit -m "Finalize rotation authority and destination ranking [rotation-authority-finalize]"
          git push origin HEAD:${{ github.head_ref || github.ref_name }}
