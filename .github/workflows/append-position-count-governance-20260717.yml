name: Append position-count governance records

on:
  pull_request:
    branches:
      - main
    paths:
      - "control/run_queue/append_position_count_governance_20260717.md"
      - "tools/append_position_count_governance_20260717.py"
      - ".github/workflows/append-position-count-governance-20260717.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: append-position-count-governance-20260717-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

jobs:
  append-and-clean:
    runs-on: ubuntu-latest
    steps:
      - name: Check out target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Append records and remove temporary files
        run: python tools/append_position_count_governance_20260717.py

      - name: Commit governance records and self-cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add control/DECISION_LOG.md control/ETF_SESSION_CHANGELOG.md
          git add -u \
            .github/workflows/append-position-count-governance-20260717.yml \
            control/run_queue/append_position_count_governance_20260717.md \
            tools/append_position_count_governance_20260717.py \
            || true
          git diff --cached --quiet && { echo "No governance changes required"; exit 0; }
          git commit -m "Append ETF position-count governance records [skip ci]"
          target_branch="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          git push origin HEAD:"$target_branch"
