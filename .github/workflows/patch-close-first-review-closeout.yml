name: Patch close-first review closeout

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/patch-close-first-review-closeout.yml"
      - "tools/patch_close_first_review_closeout.py"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Check out closeout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Patch closeout records and self-clean
        run: python tools/patch_close_first_review_closeout.py
