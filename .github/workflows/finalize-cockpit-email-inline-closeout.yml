name: Finalize cockpit email inline closeout

on:
  push:
    branches:
      - agent/cockpit-email-html-inline-style-closeout
    paths:
      - tools/finalize_cockpit_email_inline_closeout.py
      - .github/workflows/finalize-cockpit-email-inline-closeout.yml

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - name: Check out closeout branch
        uses: actions/checkout@v4
        with:
          ref: agent/cockpit-email-html-inline-style-closeout
          fetch-depth: 0
      - name: Finalize records and self-clean
        run: |
          python tools/finalize_cockpit_email_inline_closeout.py
          rm tools/finalize_cockpit_email_inline_closeout.py
          rm .github/workflows/finalize-cockpit-email-inline-closeout.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add control/CURRENT_STATE.md control/NEXT_ACTIONS.md control/work_packages/WP_COCKPIT_EMAIL_HTML_INLINE_STYLE_FIX_20260718.md control/work_package_claims/WP_COCKPIT_EMAIL_HTML_INLINE_STYLE_FIX_20260718.md control/handovers/HANDOVER_COCKPIT_EMAIL_HTML_INLINE_STYLE_FIX_20260718.md control/evidence/COCKPIT_EMAIL_HTML_INLINE_STYLE_FIX_EVIDENCE_20260718.json tools/finalize_cockpit_email_inline_closeout.py .github/workflows/finalize-cockpit-email-inline-closeout.yml
          git commit -m "Finalize cockpit email inline-style closeout [skip ci]"
          git push origin HEAD:agent/cockpit-email-html-inline-style-closeout
