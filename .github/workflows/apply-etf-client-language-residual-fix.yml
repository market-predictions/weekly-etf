name: Apply ETF client-language residual fix

on:
  push:
    branches:
      - main
    paths:
      - "control/run_queue/weekly_etf_client_language_fix_*.md"

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Apply language-specific residual fix
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('runtime/report_surface_language_contract.py')
          text = path.read_text(encoding='utf-8')
          text = text.replace(
              '    "Rotation engine status": "Implemented portfolio change",',
              '    "Rotation engine status": "Portfolio decision status",',
          )
          text = text.replace(
              '    "override min trade size not met": "positie te klein voor een efficiënte transactie",\n',
              '',
          )
          needle = '''def normalize_client_language(text: str, *, language: str) -> str:
    cleaned = text
'''
          replacement = '''def normalize_client_language(text: str, *, language: str) -> str:
    cleaned = text
    min_trade_phrase = (
        "positie te klein voor een efficiënte transactie"
        if language == "nl"
        else "position too small for an efficient trade"
    )
    cleaned = re.sub(
        r"\\boverride\\s+min trade size not met\\b",
        min_trade_phrase,
        cleaned,
        flags=re.IGNORECASE,
    )
'''
          if needle not in text:
              raise SystemExit('normalize_client_language insertion point not found')
          path.write_text(text.replace(needle, replacement, 1), encoding='utf-8')

          test = Path('tests/test_report_surface_internal_language_cleanup.py')
          t = test.read_text(encoding='utf-8')
          t = t.replace('assert "Implemented portfolio change" in cleaned', 'assert "Portfolio decision status" in cleaned')
          t += '''


def test_min_trade_constraint_is_localized_by_output_language() -> None:
    source = "override min trade size not met"
    cleaned_en = normalize_client_language(source, language="en")
    cleaned_nl = normalize_client_language(source, language="nl")
    assert cleaned_en == "position too small for an efficient trade"
    assert "positie" not in cleaned_en
    assert cleaned_nl == "positie te klein voor een efficiënte transactie"


def test_rotation_status_heading_is_neutral_without_execution_context() -> None:
    assert normalize_client_language("Rotation engine status", language="en") == "Portfolio decision status"
'''
          test.write_text(t, encoding='utf-8')
          PY
      - name: Run focused tests
        run: |
          python -m pip install pytest
          python -m pytest -q tests/test_report_surface_internal_language_cleanup.py
      - name: Commit validated fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add runtime/report_surface_language_contract.py tests/test_report_surface_internal_language_cleanup.py
          git commit -m "Fix ETF client-language residuals in non-execution reports"
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then exit 0; fi
            git pull --rebase origin main
          done
          exit 1
