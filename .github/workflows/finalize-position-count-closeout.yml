name: Finalize position-count closeout

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/finalize-position-count-closeout.yml"
      - "tools/append_position_count_governance_20260717.py"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: finalize-position-count-closeout-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - name: Check out closeout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Capture closeout result
        run: |
          set +e
          python tools/append_position_count_governance_20260717.py > /tmp/position-count-closeout.log 2>&1
          status=$?
          echo "$status" > /tmp/position-count-closeout.status
          cat /tmp/position-count-closeout.log
          exit 0

      - name: Upload closeout diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: position-count-closeout-${{ github.run_id }}
          path: |
            /tmp/position-count-closeout.log
            /tmp/position-count-closeout.status
          if-no-files-found: error
          retention-days: 7

      - name: Enforce closeout result
        run: test "$(cat /tmp/position-count-closeout.status)" = "0"
