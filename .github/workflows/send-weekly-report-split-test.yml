name: Send weekly ETF Pro split-test report

on:
  push:
    paths:
      - "output_split_test/weekly_analysis_pro_*.md"
      - "send_report.py"
      - ".github/workflows/send-weekly-report-split-test.yml"
  workflow_dispatch:

jobs:
  send-report-split-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system packages for PDF rendering
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcairo2 \
            libpango-1.0-0 \
            libgdk-pixbuf-2.0-0 \
            libffi-dev \
            shared-mime-info \
            fonts-liberation \
            fonts-dejavu-core \
            fonts-lato

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install matplotlib mistune weasyprint

      - name: Validate HTML/PDF render before send
        env:
          MRKT_RPRTS_REPORT_MODE: pro
        run: |
          python - <<'PY'
          from pathlib import Path
          import send_report as sr

          split_dir = Path("output_split_test")
          latest = sr.latest_report_file(split_dir, mode="pro")
          sr.generate_delivery_assets(split_dir, latest, mode="pro")
          print(f"RENDER_OK | mode=pro | report={latest.name} | split_test=yes")
          PY

      - name: Send split-test email
        env:
          MRKT_RPRTS_REPORT_MODE: pro
          MRKT_RPRTS_SUBJECT_PREFIX: Weekly ETF Pro Review [SPLIT TEST]
          MRKT_RPRTS_SMTP_HOST: ${{ secrets.MRKT_RPRTS_SMTP_HOST }}
          MRKT_RPRTS_SMTP_PORT: ${{ secrets.MRKT_RPRTS_SMTP_PORT }}
          MRKT_RPRTS_SMTP_USER: ${{ secrets.MRKT_RPRTS_SMTP_USER }}
          MRKT_RPRTS_SMTP_PASS: ${{ secrets.MRKT_RPRTS_SMTP_PASS }}
          MRKT_RPRTS_MAIL_FROM: ${{ secrets.MRKT_RPRTS_MAIL_FROM }}
          MRKT_RPRTS_MAIL_TO: ${{ secrets.MRKT_RPRTS_MAIL_TO }}
        run: |
          python - <<'PY'
          from pathlib import Path
          import send_report as sr

          split_dir = Path("output_split_test")
          latest = sr.latest_report_file(split_dir, mode="pro")
          assets = sr.generate_delivery_assets(split_dir, latest, mode="pro")
          attachments, manifest_path, mail_to = sr.send_email_with_attachments(assets, mode="pro")
          print(
              f"DELIVERY_OK | mode=pro | report={latest.name} | recipient={mail_to} | "
              f"html_body=full_report | pdf_attached=yes | manifest={manifest_path.name} | "
              f"attachments={', '.join(attachments)} | split_test=yes"
          )
          PY
