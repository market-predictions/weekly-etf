name: Validate ETF position-count constraint

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/validate-etf-position-count-contract.yml"
      - "runtime/position_count_contract.py"
      - "runtime/position_count_report_surface.py"
      - "tools/validate_etf_persisted_valuation_state.py"
      - "tools/validate_etf_client_surface_clean.py"
      - "tools/validate_etf_position_count_contract.py"
      - "tests/test_etf_position_count_contract.py"
      - "control/work_packages/WP_PORTFOLIO_POSITION_COUNT_CONSTRAINT_RECONCILIATION_20260717.md"
      - "control/work_package_claims/WP_PORTFOLIO_POSITION_COUNT_CONSTRAINT_RECONCILIATION_20260717.md"
      - "control/decisions/PORTFOLIO_POSITION_COUNT_CONSTRAINT_RECONCILIATION_DECISION_20260717.md"
      - "control/handovers/HANDOVER_PORTFOLIO_POSITION_COUNT_CONSTRAINT_RECONCILIATION_20260717.md"
      - "control/evidence/PORTFOLIO_POSITION_COUNT_CONSTRAINT_RECONCILIATION_EVIDENCE_20260717.json"
      - "control/CURRENT_STATE.md"
      - "control/NEXT_ACTIONS.md"
      - "control/DECISION_LOG.md"
      - "control/ETF_SESSION_CHANGELOG.md"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: .
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install focused dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest

      - name: Snapshot protected authority and historical reports
        run: |
          sha256sum \
            output/etf_portfolio_state.json \
            output/etf_trade_ledger.csv \
            output/etf_valuation_history.csv \
            output/weekly_analysis_pro_260716_02.md \
            output/weekly_analysis_pro_nl_260716_02.md \
            > /tmp/position-count-before.sha256

      - name: Compile implementation and validator
        run: |
          python -m py_compile \
            runtime/position_count_contract.py \
            runtime/position_count_report_surface.py \
            tools/validate_etf_persisted_valuation_state.py \
            tools/validate_etf_client_surface_clean.py \
            tools/validate_etf_position_count_contract.py

      - name: Run focused position-count regressions
        run: |
          set -o pipefail
          pytest -q tests/test_etf_position_count_contract.py 2>&1 | tee /tmp/position-count-tests.log

      - name: Validate current official state and bilingual output contract
        run: |
          set -o pipefail
          python tools/validate_etf_position_count_contract.py \
            --portfolio-state output/etf_portfolio_state.json \
            --english-report output/weekly_analysis_pro_260716_02.md \
            --dutch-report output/weekly_analysis_pro_nl_260716_02.md \
            --trade-ledger output/etf_trade_ledger.csv \
            --valuation-history output/etf_valuation_history.csv \
            --evidence /tmp/etf-position-count-contract-evidence.json \
            2>&1 | tee /tmp/position-count-validator.log

      - name: Prove protected files remain unchanged
        run: |
          sha256sum \
            output/etf_portfolio_state.json \
            output/etf_trade_ledger.csv \
            output/etf_valuation_history.csv \
            output/weekly_analysis_pro_260716_02.md \
            output/weekly_analysis_pro_nl_260716_02.md \
            > /tmp/position-count-after.sha256
          diff -u /tmp/position-count-before.sha256 /tmp/position-count-after.sha256
          git diff --exit-code -- \
            output/etf_portfolio_state.json \
            output/etf_trade_ledger.csv \
            output/etf_valuation_history.csv \
            output/weekly_analysis_pro_260716_02.md \
            output/weekly_analysis_pro_nl_260716_02.md

      - name: Upload validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: etf-position-count-contract-${{ github.run_id }}
          path: |
            /tmp/position-count-before.sha256
            /tmp/position-count-after.sha256
            /tmp/position-count-tests.log
            /tmp/position-count-validator.log
            /tmp/etf-position-count-contract-evidence.json
          if-no-files-found: error
          retention-days: 14
