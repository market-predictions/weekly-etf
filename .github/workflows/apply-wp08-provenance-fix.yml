name: Apply WP08 provenance contract fix

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/apply-wp08-provenance-fix.yml"

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'fix/cockpit-wp08-natural-dutch-provenance-contract'
    runs-on: ubuntu-latest
    steps:
      - name: Check out PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply narrow contract patch
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('runtime/build_cockpit_side_by_side_review.py')
          text = path.read_text(encoding='utf-8')

          helper_old = '''def _contains_all(text: str, values: list[str]) -> bool:\n    lower = text.lower()\n    return all(value.lower() in lower for value in values)\n\n\n'''
          helper_new = '''def _contains_all(text: str, values: list[str]) -> bool:\n    lower = text.lower()\n    return all(value.lower() in lower for value in values)\n\n\ndef _contains_any(text: str, values: tuple[str, ...]) -> bool:\n    lower = text.lower()\n    return any(value.lower() in lower for value in values)\n\n\ndef _dutch_provenance_status(text: str) -> tuple[bool, bool]:\n    delivery_status = _contains_any(text, ("Geen deliveryclaim", "Geen leveringsclaim"))\n    promotion_status = _contains_any(\n        text,\n        ("Niet gepromoveerd naar productie", "Niet naar productie gepromoveerd"),\n    )\n    return delivery_status, promotion_status\n\n\n'''
          if '_dutch_provenance_status' not in text:
              if helper_old not in text:
                  raise SystemExit('contains helper target not found')
              text = text.replace(helper_old, helper_new)

          block_old = '''    provenance_terms_nl = [\n        _relative(state_path, output_dir) or "",\n        _relative(pricing_path, output_dir) or "",\n        _relative(manifest_path, output_dir) or "",\n        "Geen deliveryclaim",\n        "Niet gepromoveerd naar productie",\n    ]\n    provenance_pass = _contains_all(cockpit_en, provenance_terms_en) and _contains_all(cockpit_nl, provenance_terms_nl)\n    findings.append(\n        _finding(\n            "trust_provenance_clarity",\n            "pass" if provenance_pass else "fail",\n            "The classic report keeps the full pricing, holdings and audit context.",\n            "The WP07 provenance strip now exposes runtime state, pricing audit, run manifest, no-delivery and no-promotion status." if provenance_pass else "The cockpit provenance strip is incomplete.",\n            provenance_terms_en,\n            "Treat the WP07 provenance requirement as closed; preserve the visible evidence strip." if provenance_pass else "Restore complete visible source and status provenance.",\n            blocking=not provenance_pass,\n        )\n    )\n'''
          block_new = '''    provenance_paths_nl = [\n        _relative(state_path, output_dir) or "",\n        _relative(pricing_path, output_dir) or "",\n        _relative(manifest_path, output_dir) or "",\n    ]\n    nl_delivery_status, nl_promotion_status = _dutch_provenance_status(cockpit_nl)\n    provenance_pass = (\n        _contains_all(cockpit_en, provenance_terms_en)\n        and _contains_all(cockpit_nl, provenance_paths_nl)\n        and nl_delivery_status\n        and nl_promotion_status\n    )\n    provenance_evidence = provenance_terms_en + [\n        f"nl_delivery_status={nl_delivery_status}",\n        f"nl_promotion_status={nl_promotion_status}",\n    ]\n    findings.append(\n        _finding(\n            "trust_provenance_clarity",\n            "pass" if provenance_pass else "fail",\n            "The classic report keeps the full pricing, holdings and audit context.",\n            "The WP07 provenance strip now exposes runtime state, pricing audit, run manifest, no-delivery and no-promotion status." if provenance_pass else "The cockpit provenance strip is incomplete.",\n            provenance_evidence,\n            "Treat the WP07 provenance requirement as closed; preserve the visible evidence strip." if provenance_pass else "Restore complete visible source and status provenance.",\n            blocking=not provenance_pass,\n        )\n    )\n'''
          if 'provenance_paths_nl' not in text:
              if block_old not in text:
                  raise SystemExit('provenance block target not found')
              text = text.replace(block_old, block_new)

          path.write_text(text, encoding='utf-8')

          test_path = Path('tests/test_cockpit_wp08_provenance_label_contract.py')
          test_path.write_text('''from runtime.build_cockpit_side_by_side_review import _dutch_provenance_status\n\n\ndef test_wp08_accepts_legacy_dutch_provenance_status_labels() -> None:\n    text = "Geen deliveryclaim; Niet gepromoveerd naar productie"\n    assert _dutch_provenance_status(text) == (True, True)\n\n\ndef test_wp08_accepts_natural_dutch_provenance_status_labels() -> None:\n    text = "Geen leveringsclaim; Niet naar productie gepromoveerd"\n    assert _dutch_provenance_status(text) == (True, True)\n\n\ndef test_wp08_requires_both_dutch_provenance_statuses() -> None:\n    assert _dutch_provenance_status("Geen leveringsclaim") == (True, False)\n    assert _dutch_provenance_status("Niet naar productie gepromoveerd") == (False, True)\n''', encoding='utf-8')
          PY

      - name: Validate patch
        run: |
          python -m py_compile runtime/build_cockpit_side_by_side_review.py
          python -m pytest -q tests/test_cockpit_wp08_provenance_label_contract.py tests/test_cockpit_side_by_side_review.py

      - name: Remove temporary helper workflows
        run: |
          rm -f .github/workflows/export-wp08-builder-source.yml
          rm -f .github/workflows/apply-wp08-provenance-fix.yml

      - name: Commit and push patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add runtime/build_cockpit_side_by_side_review.py tests/test_cockpit_wp08_provenance_label_contract.py .github/workflows
          git commit -m "Fix WP08 Dutch provenance label contract"
          git push origin HEAD:${{ github.head_ref }}
