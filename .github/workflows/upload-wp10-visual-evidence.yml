name: Upload WP10 visual evidence

on:
  push:
    branches:
      - feature/cockpit-wp10-additive-delivery-front-page
    paths:
      - "control/triggers/upload_wp10_visual_evidence.txt"

permissions:
  contents: write

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/cockpit-wp10-additive-delivery-front-page
      - name: Upload validated EN/NL artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cockpit-wp10-visual-evidence-${{ github.run_id }}
          path: |
            output/wp10_validation/enabled/weekly_analysis_pro_260714_04.pdf
            output/wp10_validation/enabled/weekly_analysis_pro_nl_260714_04.pdf
            output/wp10_validation/enabled/weekly_analysis_pro_260714_04_delivery.html
            output/wp10_validation/enabled/weekly_analysis_pro_nl_260714_04_delivery.html
          if-no-files-found: error
          retention-days: 14
      - name: Record artifact run id
        run: |
          python - <<'PY'
          import json, os
          from pathlib import Path
          path = Path('output/wp10_validation/visual_artifact_run.json')
          path.write_text(json.dumps({
              'run_id': os.environ['GITHUB_RUN_ID'],
              'head_sha': os.environ['GITHUB_SHA'],
              'artifact_name': f"cockpit-wp10-visual-evidence-{os.environ['GITHUB_RUN_ID']}",
          }, indent=2, sort_keys=True), encoding='utf-8')
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f output/wp10_validation/visual_artifact_run.json
          git commit -m "Record WP10 visual artifact run" || exit 0
          git push origin HEAD:feature/cockpit-wp10-additive-delivery-front-page
