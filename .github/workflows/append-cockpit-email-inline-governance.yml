name: Append cockpit email inline governance

on:
  push:
    branches:
      - agent/cockpit-email-html-inline-style-fix
    paths:
      - tools/append_cockpit_email_inline_governance.py
      - .github/workflows/append-cockpit-email-inline-governance.yml

permissions:
  contents: write

jobs:
  append:
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: agent/cockpit-email-html-inline-style-fix
          fetch-depth: 0
      - name: Append governance and self-clean
        run: |
          python tools/append_cockpit_email_inline_governance.py
          rm tools/append_cockpit_email_inline_governance.py
          rm .github/workflows/append-cockpit-email-inline-governance.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add control/CURRENT_STATE.md control/NEXT_ACTIONS.md control/DECISION_LOG.md control/ETF_SESSION_CHANGELOG.md tools/append_cockpit_email_inline_governance.py .github/workflows/append-cockpit-email-inline-governance.yml
          git commit -m "Record cockpit email inline-style governance [skip ci]"
          git push origin HEAD:agent/cockpit-email-html-inline-style-fix
