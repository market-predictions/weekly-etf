name: Diagnose ETF runtime state

on:
  push:
    branches:
      - main
    paths:
      - "control/run_queue/weekly_etf_runtime_state_diagnostic_*.md"

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install pyyaml
      - name: Run exact runtime state builder
        id: diagnose
        shell: bash
        run: |
          set +e
          mkdir -p output/run_manifests
          AUDIT="$(tr -d '\r\n' < output/pricing/latest_price_audit_path.txt)"
          LANE="$(find output/lane_reviews -maxdepth 1 -type f -name 'etf_lane_assessment_*.json' | sort | tail -n 1)"
          PLAN="$(tr -d '\r\n' < output/runtime/latest_etf_rotation_plan_path.txt)"
          LOG="$(mktemp)"
          python -m runtime.build_etf_report_state \
            --pricing-audit "$AUDIT" \
            --lane-artifact "$LANE" \
            --rotation-plan "$PLAN" \
            --output-path /tmp/etf-report-state.json \
            >"$LOG" 2>&1
          RC=$?
          OUT="output/run_manifests/weekly_etf_runtime_state_diagnostic_${GITHUB_RUN_ID}.json"
          python - "$OUT" "$AUDIT" "$LANE" "$PLAN" "$RC" "$LOG" <<'PY'
          import json, os, sys
          from datetime import datetime, timezone
          from pathlib import Path
          out, audit, lane, plan, rc, log = sys.argv[1:]
          Path(out).write_text(json.dumps({
            "schema_version": "1.0",
            "created_at_utc": datetime.now(timezone.utc).isoformat(),
            "github_run_id": os.environ.get("GITHUB_RUN_ID"),
            "pricing_audit": audit,
            "lane_artifact": lane,
            "rotation_plan": plan,
            "return_code": int(rc),
            "state_produced": Path('/tmp/etf-report-state.json').exists(),
            "output": Path(log).read_text(encoding='utf-8', errors='replace')
          }, indent=2), encoding='utf-8')
          PY
          echo "out=$OUT" >> "$GITHUB_OUTPUT"
          echo "rc=$RC" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Persist diagnostic
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f "${{ steps.diagnose.outputs.out }}"
          git commit -m "Persist ETF runtime-state diagnostic [skip ci]"
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then exit 0; fi
            git pull --rebase origin main
          done
          exit 1
      - name: Reproduce status
        if: steps.diagnose.outputs.rc != '0'
        run: exit 1
