name: Validate Stage-2 decision dry run

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip pytest
      - run: pytest tests/test_stage2_promotion_review_decision_dry_run.py
      - run: python tools/validate_stage2_promotion_review_decision_dry_run.py
