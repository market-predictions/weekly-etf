name: Validate ETF macro regime shadow

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "config/regime_thresholds.yml"
      - "fixtures/macro_regime_shadow/**"
      - "macro_regime/**"
      - "runtime/build_macro_policy_pack_shadow.py"
      - "tools/replay_macro_regime_shadow_fixtures.py"
      - "tools/validate_macro_regime_shadow.py"
      - "tools/write_macro_regime_shadow_validation_evidence.py"
      - ".github/workflows/validate-macro-regime-shadow.yml"

permissions:
  contents: write

jobs:
  validate-shadow-regime:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: .
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml pandas yfinance

      - name: Replay deterministic regime fixtures
        run: |
          python tools/replay_macro_regime_shadow_fixtures.py \
            --fixtures fixtures/macro_regime_shadow/regime_shadow_fixtures.json \
            --thresholds config/regime_thresholds.yml

      - name: Build shadow macro policy pack
        run: |
          python -m runtime.build_macro_policy_pack_shadow \
            --pricing-audit output/pricing/price_audit_2026-05-29_20260531_203900.json \
            --relative-strength output/market_history/etf_relative_strength.json \
            --macro-context config/etf_macro_fundamental_context.yml \
            --macro-data-audit '' \
            --output-dir output/macro \
            --run-id shadow_validation

      - name: Validate macro policy pack schema
        run: |
          python tools/validate_macro_policy_pack.py --pack output/macro/latest.json

      - name: Validate shadow regime payload
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          from tools.validate_macro_regime_shadow import validate_shadow_payload
          pack = json.loads(Path('output/macro/latest.json').read_text(encoding='utf-8'))
          result = validate_shadow_payload(pack.get('deterministic_regime_shadow') or {})
          print(
              'ETF_MACRO_REGIME_SHADOW_OK | '
              f"candidate={result['candidate_regime']} | "
              f"confidence={result['candidate_confidence']} | "
              f"legacy={result['legacy_regime']} | "
              f"differs={result['differs_from_legacy']}"
          )
          PY

      - name: Write shadow validation evidence
        run: |
          python tools/write_macro_regime_shadow_validation_evidence.py \
            --pack output/macro/latest.json \
            --output-dir output/macro/validation \
            --workflow-name "${{ github.workflow }}" \
            --workflow-run-id "${{ github.run_id }}" \
            --workflow-run-number "${{ github.run_number }}" \
            --workflow-attempt "${{ github.run_attempt }}" \
            --commit-sha "${{ github.sha }}" \
            --source-ref "${{ github.ref_name }}"

      - name: Commit shadow validation evidence
        if: github.event_name != 'pull_request'
        run: |
          if git diff --quiet -- output/macro/validation; then
            echo "ETF_MACRO_REGIME_SHADOW_EVIDENCE_NO_CHANGE"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/macro/validation/*.json
          git commit -m "record macro regime shadow validation evidence [skip ci]"
          git push
