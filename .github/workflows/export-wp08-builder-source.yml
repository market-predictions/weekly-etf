name: Export WP08 builder source

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/export-wp08-builder-source.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Upload current builder source
        uses: actions/upload-artifact@v4
        with:
          name: wp08-builder-source-${{ github.run_id }}
          path: runtime/build_cockpit_side_by_side_review.py
          if-no-files-found: error
          retention-days: 1
