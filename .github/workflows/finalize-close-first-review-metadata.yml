name: Finalize close-first review metadata

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/finalize-close-first-review-metadata.yml"
      - "tools/finalize_close_first_review_metadata.py"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - name: Check out metadata branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Finalize records and self-clean
        run: python tools/finalize_close_first_review_metadata.py
