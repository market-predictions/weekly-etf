name: Assemble portfolio close-first review

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/assemble-portfolio-close-first-review.yml"
      - "control/tmp/close_first_review_source/**"
      - "control/tmp/close_first_review_parts/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: assemble-portfolio-close-first-review-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

jobs:
  assemble:
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Assemble and compile review builder
        run: |
          set -euo pipefail
          mkdir -p runtime
          cat control/tmp/close_first_review_source/*.pyfrag > runtime/build_portfolio_close_first_review.py
          python -m py_compile runtime/build_portfolio_close_first_review.py

      - name: Remove temporary assembly inputs
        run: |
          rm -rf control/tmp/close_first_review_source
          rm -rf control/tmp/close_first_review_parts
          rm -f .github/workflows/assemble-portfolio-close-first-review.yml

      - name: Commit assembled builder and self-cleanup
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add runtime/build_portfolio_close_first_review.py
          git add -A control/tmp .github/workflows/assemble-portfolio-close-first-review.yml
          git diff --cached --quiet && { echo "No assembly changes required"; exit 0; }
          git commit -m "Assemble portfolio close-first execution review builder [skip ci]"
          git push origin HEAD:${{ github.head_ref || github.ref_name }}
