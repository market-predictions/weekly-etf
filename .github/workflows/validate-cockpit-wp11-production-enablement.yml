name: Validate cockpit WP11 production enablement

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/send-weekly-report.yml"
      - ".github/workflows/validate-cockpit-wp11-production-enablement.yml"
      - "tools/validate_cockpit_wp11_production_enablement.py"
      - "tests/test_cockpit_wp11_production_enablement.py"
      - "runtime/additive_cockpit_front_page.py"
      - "send_report_runtime_html.py"
      - "control/work_packages/WP_COCKPIT_SURFACE_11_PRODUCTION_ENABLEMENT_CLOSEOUT_20260717.md"
      - "control/work_package_claims/WP_COCKPIT_SURFACE_11_PRODUCTION_ENABLEMENT_CLOSEOUT_20260717.md"
      - "control/evidence/COCKPIT_WP11_PRODUCTION_ENABLEMENT_EVIDENCE_20260717.json"
      - "control/CURRENT_STATE.md"
      - "control/NEXT_ACTIONS.md"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: .
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system packages for PDF rendering
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcairo2 \
            libpango-1.0-0 \
            libgdk-pixbuf-2.0-0 \
            libffi-dev \
            shared-mime-info \
            fonts-liberation \
            fonts-dejavu-core \
            fonts-lato \
            poppler-utils

      - name: Install validation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            pytest \
            pandas \
            matplotlib \
            markdown \
            mistune \
            beautifulsoup4 \
            weasyprint \
            pyyaml \
            yfinance \
            pypdf

      - name: Compile WP11 modules
        run: |
          python -m py_compile \
            tools/validate_cockpit_wp11_production_enablement.py \
            tests/test_cockpit_wp11_production_enablement.py

      - name: Run focused WP11 tests
        run: pytest -q tests/test_cockpit_wp11_production_enablement.py

      - name: Validate official whole-share state
        run: |
          python tools/validate_etf_whole_share_contract.py \
            --portfolio-state output/etf_portfolio_state.json

      - name: Build exact-current no-send production evidence
        run: |
          rm -rf /tmp/weekly-etf-wp11 output/wp11_validation
          python tools/validate_cockpit_wp11_production_enablement.py \
            --repo-root . \
            --work-root /tmp/weekly-etf-wp11 \
            --evidence-dir output/wp11_validation \
            --runtime-state output/runtime/etf_report_state_20260716_20260717_094728.json

      - name: Verify WP11 evidence contract
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path("output/wp11_validation/cockpit_wp11_production_enablement_evidence.json")
          payload = json.loads(path.read_text(encoding="utf-8"))
          assert payload["schema_version"] == "cockpit_wp11_production_enablement_evidence_v1"
          assert payload["status"] == "validated_ready_for_production_enablement_merge"
          assert payload["selected_option"] == "B_enable_additive_delivery_front_page"
          assert payload["production_feature"]["value"] == "enabled"
          assert payload["production_feature"]["rollback_value"] == "disabled"
          assert payload["exact_current_authority"]["whole_share_status"] == "compliant"
          assert payload["exact_current_authority"]["position_count"] == 8
          assert payload["exact_current_authority"]["nav_eur"] == 107117.94
          assert payload["exact_current_authority"]["cash_eur"] == 2519.05
          for language in ("en", "nl"):
              row = payload["languages"][language]
              assert row["disabled_front_page_count"] == 0
              assert row["enabled_front_page_count"] == 1
              assert row["enabled_small_decision_cockpit_count"] == 0
              assert row["classic_report_body"] == "preserved"
              assert row["pdf_page_delta"] == 1
          assert payload["delivery_contract"]["email_sent"] is False
          assert payload["authority_contract"]["protected_hashes_before_after"] == "identical"
          PY

      - name: Prove repository authority unchanged
        run: |
          git diff --exit-code -- \
            output/etf_portfolio_state.json \
            output/etf_trade_ledger.csv \
            output/etf_valuation_history.csv \
            output/etf_recommendation_scorecard.csv \
            output/runtime/latest_etf_report_state_path.txt \
            output/pricing/latest_price_audit_path.txt \
            output/run_manifests/latest_weekly_etf_run_manifest_path.txt

      - name: Upload WP11 evidence
        uses: actions/upload-artifact@v4
        with:
          name: cockpit-wp11-production-enablement-${{ github.run_id }}
          path: output/wp11_validation/
          if-no-files-found: error
          retention-days: 30
