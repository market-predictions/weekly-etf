name: Apply cockpit WP11 production enablement

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/apply-cockpit-wp11-production-enablement.yml"

permissions:
  contents: write

jobs:
  patch:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Apply exact workflow enablement
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('.github/workflows/send-weekly-report.yml')
          text = path.read_text(encoding='utf-8')
          old = '  send-report:\n    runs-on: ubuntu-latest\n'
          new = '  send-report:\n    runs-on: ubuntu-latest\n    env:\n      MRKT_RPRTS_COCKPIT_FRONT_PAGE: enabled\n'
          if new in text:
              pass
          else:
              assert text.count(old) == 1, text.count(old)
              text = text.replace(old, new, 1)
              path.write_text(text, encoding='utf-8')
          PY
      - name: Remove temporary patch workflow
        run: rm .github/workflows/apply-cockpit-wp11-production-enablement.yml
      - name: Commit production enablement
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/send-weekly-report.yml .github/workflows/apply-cockpit-wp11-production-enablement.yml
          git commit -m "Enable validated cockpit front page in production workflow"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
