name: Diagnose ETF report freshness tests

on:
  pull_request:
    branches:
      - main
    paths:
      - "control/run_queue/diagnose_report_freshness_20260716.md"

permissions:
  contents: read

jobs:
  diagnose:
    if: github.head_ref == 'agent/fix-report-freshness-and-html-equity-graph'
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: .
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install focused dependencies
        run: python -m pip install pytest pyyaml matplotlib pandas
      - name: Apply source integration
        run: |
          python tools/apply_report_freshness_integration_patch.py
          python tools/apply_report_freshness_followup_patch.py
      - name: Run focused tests with retained transcript
        id: tests
        run: |
          set +e
          python -m pytest -vv tests/test_report_freshness_and_html_equity.py 2>&1 | tee /tmp/report-freshness-pytest.log
          status=${PIPESTATUS[0]}
          echo "$status" > /tmp/report-freshness-pytest.status
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload diagnostic transcript
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-freshness-pytest-${{ github.run_id }}
          path: |
            /tmp/report-freshness-pytest.log
            /tmp/report-freshness-pytest.status
          retention-days: 14
      - name: Enforce focused test result
        run: test "${{ steps.tests.outputs.status }}" -eq 0
