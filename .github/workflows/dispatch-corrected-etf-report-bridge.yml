name: Dispatch corrected ETF report bridge

on:
  pull_request:
    branches:
      - main
    paths:
      - "control/run_queue/weekly_etf_report_correction_dispatch_20260715.md"

permissions:
  contents: write

jobs:
  correct-deliver-and-persist:
    if: github.head_ref == 'ops/dispatch-corrected-etf-report-20260715'
    runs-on: ubuntu-latest
    env:
      MRKT_RPRTS_SMTP_HOST: ${{ secrets.MRKT_RPRTS_SMTP_HOST }}
      MRKT_RPRTS_SMTP_PORT: ${{ secrets.MRKT_RPRTS_SMTP_PORT }}
      MRKT_RPRTS_SMTP_USER: ${{ secrets.MRKT_RPRTS_SMTP_USER }}
      MRKT_RPRTS_SMTP_PASS: ${{ secrets.MRKT_RPRTS_SMTP_PASS }}
      MRKT_RPRTS_MAIL_FROM: ${{ secrets.MRKT_RPRTS_MAIL_FROM }}
      MRKT_RPRTS_MAIL_TO: ${{ secrets.MRKT_RPRTS_MAIL_TO }}
      MRKT_RPRTS_MAIL_TO_NL: ${{ secrets.MRKT_RPRTS_MAIL_TO_NL }}
      ETF_CORRECTION_REQUEST_FILE: control/run_queue/weekly_etf_report_correction_request_20260715_230541.md

    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system packages for PDF rendering
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcairo2 \
            libpango-1.0-0 \
            libgdk-pixbuf-2.0-0 \
            libffi-dev \
            shared-mime-info \
            fonts-liberation \
            fonts-dejavu-core \
            fonts-lato \
            poppler-utils

      - name: Install production report dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            pandas \
            matplotlib \
            seaborn \
            markdown \
            beautifulsoup4 \
            lxml \
            premailer \
            weasyprint \
            pillow \
            requests \
            pyyaml \
            jsonschema \
            yfinance

      - name: Verify production SMTP contract
        run: |
          set -euo pipefail
          test -n "$MRKT_RPRTS_SMTP_HOST"
          test -n "$MRKT_RPRTS_SMTP_PORT"
          test -n "$MRKT_RPRTS_SMTP_USER"
          test -n "$MRKT_RPRTS_SMTP_PASS"
          test -n "$MRKT_RPRTS_MAIL_FROM"
          test -n "$MRKT_RPRTS_MAIL_TO"

      - name: Capture corrected delivery execution
        id: correction
        run: |
          set +e
          python -m runtime.run_post_execution_correction_delivery 2>&1 | tee /tmp/etf-correction-delivery.log
          status=${PIPESTATUS[0]}
          echo "$status" > /tmp/etf-correction-delivery.status
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload corrected delivery diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: corrected-etf-delivery-diagnostics-${{ github.run_id }}
          path: |
            /tmp/etf-correction-delivery.log
            /tmp/etf-correction-delivery.status
            output/weekly_analysis_pro_260714_03.md
            output/weekly_analysis_pro_nl_260714_03.md
            output/runtime/latest_etf_report_state_path.txt
          if-no-files-found: warn
          retention-days: 14

      - name: Enforce corrected delivery execution
        run: test "${{ steps.correction.outputs.status }}" -eq 0

      - name: Persist corrected reports and delivery evidence
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f \
            output/weekly_analysis_pro_260714_03* \
            output/weekly_analysis_pro_nl_260714_03* \
            output/delivery/*.json
          if git diff --cached --quiet; then
            echo "No corrected report or delivery artifacts changed" >&2
            exit 1
          fi
          git commit -m "Persist corrected Weekly ETF report delivery evidence [skip ci]"
          git push origin HEAD:main

      - name: Record correction completion
        run: echo "ETF_CORRECTION_DELIVERY_BRIDGE_OK"
