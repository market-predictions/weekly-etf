name: Dispatch corrected ETF report bridge

on:
  pull_request:
    branches:
      - main
    paths:
      - "control/run_queue/weekly_etf_report_correction_dispatch_20260715.md"

permissions:
  actions: read
  contents: write

jobs:
  recover-and-persist:
    if: github.head_ref == 'ops/dispatch-corrected-etf-report-20260715'
    runs-on: ubuntu-latest
    env:
      ETF_CORRECTION_REQUEST_FILE: control/run_queue/weekly_etf_report_correction_request_20260715_230541.md
      ETF_PRIOR_CORRECTION_WORKFLOW_RUN_ID: "29455717158"

    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system packages for PDF rendering
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcairo2 \
            libpango-1.0-0 \
            libgdk-pixbuf-2.0-0 \
            libffi-dev \
            shared-mime-info \
            fonts-liberation \
            fonts-dejavu-core \
            fonts-lato \
            poppler-utils

      - name: Install production report dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            pandas \
            matplotlib \
            seaborn \
            markdown \
            mistune \
            beautifulsoup4 \
            lxml \
            premailer \
            weasyprint \
            pillow \
            requests \
            pyyaml \
            jsonschema \
            yfinance

      - name: Download successful corrected-delivery transcript
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/prior-correction-delivery
          gh run download "$ETF_PRIOR_CORRECTION_WORKFLOW_RUN_ID" \
            --repo "${{ github.repository }}" \
            --name "corrected-etf-delivery-diagnostics-$ETF_PRIOR_CORRECTION_WORKFLOW_RUN_ID" \
            --dir /tmp/prior-correction-delivery
          delivery_log="$(find /tmp/prior-correction-delivery -type f -name etf-correction-delivery.log -print -quit)"
          test -n "$delivery_log"
          test -s "$delivery_log"
          grep -q "DELIVERY_OK | mode=pro_bilingual" "$delivery_log"
          echo "ETF_PRIOR_CORRECTION_DELIVERY_LOG=$delivery_log" >> "$GITHUB_ENV"

      - name: Recover corrected reports, render assets and manifest without sending
        run: python -m runtime.recover_post_execution_correction_evidence 2>&1 | tee /tmp/etf-correction-recovery.log

      - name: Upload correction recovery evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: corrected-etf-recovery-${{ github.run_id }}
          path: |
            /tmp/etf-correction-recovery.log
            output/weekly_analysis_pro_260714_03*
            output/weekly_analysis_pro_nl_260714_03*
            output/delivery/weekly_etf_correction_*
          if-no-files-found: warn
          retention-days: 30

      - name: Persist corrected reports and delivery evidence
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f \
            output/weekly_analysis_pro_260714_03* \
            output/weekly_analysis_pro_nl_260714_03* \
            output/delivery/weekly_etf_correction_*.json \
            output/delivery/weekly_etf_correction_*.txt
          if git diff --cached --quiet; then
            echo "No corrected report or recovery evidence changed" >&2
            exit 1
          fi
          git commit -m "Persist corrected Weekly ETF report and verified delivery evidence [skip ci]"
          git push origin HEAD:main

      - name: Record correction recovery completion
        run: echo "ETF_CORRECTION_EVIDENCE_RECOVERY_BRIDGE_OK"
