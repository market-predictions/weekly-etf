name: Patch cockpit email WP11 caption

on:
  push:
    branches:
      - agent/cockpit-email-html-inline-style-fix
    paths:
      - tools/patch_cockpit_email_wp11_caption.py
      - .github/workflows/patch-cockpit-email-wp11-caption.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: agent/cockpit-email-html-inline-style-fix
          fetch-depth: 0
      - name: Apply caption compatibility patch
        run: |
          python tools/patch_cockpit_email_wp11_caption.py
          python -m py_compile runtime/cockpit_email_safe_surface.py
      - name: Remove temporary patch inputs
        run: |
          rm tools/patch_cockpit_email_wp11_caption.py
          rm .github/workflows/patch-cockpit-email-wp11-caption.yml
      - name: Commit compatibility patch and self-cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add runtime/cockpit_email_safe_surface.py tools/patch_cockpit_email_wp11_caption.py .github/workflows/patch-cockpit-email-wp11-caption.yml
          git commit -m "Preserve WP11 cockpit caption selector [skip ci]"
          git push origin HEAD:agent/cockpit-email-html-inline-style-fix
