      - name: Remove temporary validation surfaces
        run: |
          rm -rf output/wp10_validation
          rm -f .github/workflows/run-wp10-validation-and-commit-evidence.yml
          rm -f .github/workflows/run-wp10-final-validation.yml
          rm -f .github/workflows/upload-wp10-visual-evidence.yml
          rm -f .github/workflows/closeout-wp10-clean-branch.yml
          rm -f control/triggers/run_wp10_validation.txt
