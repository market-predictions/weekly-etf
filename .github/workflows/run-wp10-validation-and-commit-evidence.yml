          rm -f control/triggers/upload_wp10_visual_evidence.txt
          rm -f control/triggers/closeout_wp10_clean_branch.txt

      - name: Commit clean WP10 branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Finalize validated WP10 additive front page"
          git push origin HEAD:feature/cockpit-wp10-additive-delivery-front-page

      - name: Validate clean committed head
        run: |
          set -euo pipefail
          test -z "$(git status --porcelain)"
          test ! -e output/wp10_validation
          test ! -e .github/workflows/run-wp10-validation-and-commit-evidence.yml
          test ! -e .github/workflows/run-wp10-final-validation.yml
          test ! -e .github/workflows/upload-wp10-visual-evidence.yml
          test ! -e .github/workflows/closeout-wp10-clean-branch.yml

