name: Finalize WP10 clean branch

on:
  push:
    branches:
      - feature/cockpit-wp10-additive-delivery-front-page
    paths:
      - "control/triggers/run_wp10_validation.txt"

permissions:
  contents: write

jobs:
  closeout:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: .
      MRKT_RPRTS_COCKPIT_FRONT_PAGE: disabled
    steps:
      - name: Check out WP10 branch
        uses: actions/checkout@v4
        with:
          ref: feature/cockpit-wp10-additive-delivery-front-page
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install validation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pandas matplotlib seaborn markdown mistune beautifulsoup4 lxml premailer weasyprint pillow requests pyyaml jsonschema yfinance pypdf

      - name: Reconcile WP10 governance
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text(encoding='utf-8')
              if old not in text:
                  raise SystemExit(f'Anchor not found in {path}: {old[:80]!r}')
              file.write_text(text.replace(old, new, 1), encoding='utf-8')

          package = 'control/work_packages/WP_COCKPIT_SURFACE_10_ADDITIVE_DELIVERY_FRONT_PAGE_20260717.md'
          replace_once(
              package,
              '''```text
status: claimed
production_enablement: false
promotion_status: not_promoted
email_send: false
```''',
              '''```text
