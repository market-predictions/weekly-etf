name: Run WP10 validation and commit evidence

on:
  push:
    branches:
      - feature/cockpit-wp10-additive-delivery-front-page
    paths:
      - "control/triggers/run_wp10_validation.txt"

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: .
      MRKT_RPRTS_COCKPIT_FRONT_PAGE: disabled
    steps:
      - name: Check out WP10 branch
        uses: actions/checkout@v4
        with:
          ref: feature/cockpit-wp10-additive-delivery-front-page
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pandas matplotlib seaborn markdown mistune beautifulsoup4 lxml premailer weasyprint pillow requests pyyaml jsonschema yfinance pypdf

      - name: Apply idempotent one-page PDF contract
        run: |
          python - <<'PY'
          from pathlib import Path

          renderer = Path('runtime/additive_cockpit_front_page.py')
          text = renderer.read_text(encoding='utf-8')
          old = "@media print{{.etf-cockpit-page{{page-break-after:always;break-after:page;border:none;margin:0;max-width:none}}}}"
          new = """@media print{{
          .etf-cockpit-page{{page-break-after:always;break-after:page;border:none;margin:0;max-width:none;font-size:9px;break-inside:avoid;page-break-inside:avoid}}
          .etf-cockpit-inner{{padding:14px 22px 12px}}
          .etf-cockpit-header{{gap:12px;padding-bottom:7px}}
          .etf-cockpit-kicker{{font-size:8px}}
          .etf-cockpit-mast{{font-size:28px;margin-top:4px}}
          .etf-cockpit-issue{{font-size:8.5px;line-height:1.35}}
          .etf-cockpit-strap{{margin-top:5px;gap:7px;font-size:8px}}
          .etf-cockpit-section-title{{margin:10px 0 5px;font-size:8.5px;gap:8px}}
          .etf-cockpit-lede{{font-size:14px;line-height:1.28}}
          .etf-cockpit-row{{gap:8px;margin-top:8px}}
          .etf-cockpit-card{{padding:8px 10px}}
          .etf-cockpit-label{{font-size:7.5px;margin-bottom:4px}}
          .etf-cockpit-value{{font-size:14.5px;line-height:1.1}}
          .etf-cockpit-note{{font-size:9px;line-height:1.25;margin-top:4px}}
          .etf-cockpit-confidence{{gap:5px;margin-top:5px;font-size:8px}}
          .etf-cockpit-bar{{height:4px}}
          .etf-cockpit-chart{{padding:8px 10px 2px}}
          .etf-cockpit-chart-caption{{gap:8px;margin-bottom:3px;font-size:9px}}
          .etf-cockpit-chart-title{{font-size:7.5px}}
          .etf-cockpit-page svg.spark{{height:58px}}
          .etf-cockpit-metric{{padding:6px 8px}}
          .etf-cockpit-metric-label{{font-size:7px}}
          .etf-cockpit-metric-value{{font-size:16px;margin-top:3px}}
          .etf-cockpit-metric-sub{{font-size:8px;margin-top:2px}}
          .etf-cockpit-discipline{{padding:7px 9px;font-size:9px;line-height:1.25}}
          .etf-cockpit-trigger{{margin-top:4px;padding:6px 8px;font-size:8.5px;line-height:1.25}}
          .etf-cockpit-evidence{{padding:6px 8px}}
          .etf-cockpit-evidence-intro{{margin:0 0 4px;font-size:8px;line-height:1.2}}
          .etf-cockpit-evidence-grid{{grid-template-columns:repeat(3,1fr);gap:3px 8px}}
          .etf-cockpit-evidence-item{{padding-top:3px}}
          .etf-cockpit-evidence-label{{font-size:6.5px}}
          .etf-cockpit-evidence-value{{margin-top:1px;font-size:7.5px}}
          .etf-cockpit-footer{{margin-top:6px;padding-top:4px;font-size:7.5px}}
          }}"""
          if old in text:
              renderer.write_text(text.replace(old, new, 1), encoding='utf-8')
          elif 'en_pages_enabled' not in text and 'font-size:9px;break-inside:avoid' not in text:
              raise SystemExit('print CSS is neither legacy nor compacted')

          validator = Path('tools/validate_cockpit_wp10_delivery_integration.py')
          text = validator.read_text(encoding='utf-8')
          old_asserts = """    assert enabled_en_pages >= disabled_en_pages + 1
    assert enabled_nl_pages >= disabled_nl_pages + 1
"""
          new_asserts = """    assert enabled_en_pages == disabled_en_pages + 1
    assert enabled_nl_pages == disabled_nl_pages + 1
"""
          if old_asserts in text:
              validator.write_text(text.replace(old_asserts, new_asserts, 1), encoding='utf-8')
          elif new_asserts not in text:
              raise SystemExit('PDF page assertion is neither legacy nor exact')
          PY

      - name: Run full WP10 validation and persist result
        shell: bash
        run: |
          set +e
          rm -rf output/wp10_validation /tmp/weekly-etf-wp10
          mkdir -p output/wp10_validation
          exec > >(tee output/wp10_validation/workflow.log) 2>&1

          files=(
            output/etf_portfolio_state.json
            output/etf_trade_ledger.csv
            output/etf_valuation_history.csv
            output/etf_recommendation_scorecard.csv
            output/runtime/latest_etf_report_state_path.txt
            output/pricing/latest_price_audit_path.txt
            output/run_manifests/latest_weekly_etf_run_manifest_path.txt
          )
          for pointer in output/runtime/latest_etf_report_state_path.txt output/pricing/latest_price_audit_path.txt output/run_manifests/latest_weekly_etf_run_manifest_path.txt; do
            if [ -s "$pointer" ]; then
              target="$(cat "$pointer")"
              if [ -f "$target" ]; then files+=("$target"); fi
            fi
          done
          printf '%s\n' "${files[@]}" | sort -u > output/wp10_validation/protected_files.txt
          xargs -d '\n' sha256sum < output/wp10_validation/protected_files.txt > output/wp10_validation/protected_before.sha256

          status=0
          python -m py_compile runtime/additive_cockpit_front_page.py send_report_runtime_html.py tools/validate_cockpit_wp10_delivery_integration.py tests/test_cockpit_wp10_additive_delivery_front_page.py || status=$?
          if [ "$status" -eq 0 ]; then
            pytest -q tests/test_cockpit_wp10_additive_delivery_front_page.py tests/test_cockpit_front_page_preview.py tests/test_cockpit_visual_state_contracts.py tests/test_cockpit_current_runtime_authority.py tests/test_cockpit_side_by_side_review.py tests/test_cockpit_wp08_evidence_review.py tests/test_cockpit_wp09_client_surface_refinement.py || status=$?
          fi
          if [ "$status" -eq 0 ]; then
            python tools/validate_etf_delivery_html_contract.py --output-dir output || status=$?
          fi
          if [ "$status" -eq 0 ]; then
            python tools/validate_etf_macro_thesis_surface_leakage.py --output-dir output || status=$?
          fi
          if [ "$status" -eq 0 ]; then
            python tools/validate_cockpit_wp10_delivery_integration.py --repo-root . --work-root /tmp/weekly-etf-wp10 --evidence-dir output/wp10_validation || status=$?
          fi
          if [ "$status" -eq 0 ]; then
            rm -rf output/cockpit_preview output/cockpit_review
            python -m runtime.render_cockpit_front_page --output-dir output --language both --html-only || status=$?
          fi
          if [ "$status" -eq 0 ]; then
            python -m runtime.build_cockpit_side_by_side_review --output-dir output --token 260714 || status=$?
          fi
          if [ "$status" -eq 0 ]; then
            python - <<'PY' || status=$?
          import json
          from pathlib import Path
          path = Path('output/cockpit_review/weekly_etf_cockpit_side_by_side_review_260714.json')
          payload = json.loads(path.read_text(encoding='utf-8'))
          assert payload['review_conclusion'] == 'ready_for_promotion_decision'
          assert payload['blocking_findings'] == []
          assert payload['promotion_status'] == 'not_promoted'
          assert all(row['status'] == 'pass' for row in payload['findings'])
          PY
          fi

          xargs -d '\n' sha256sum < output/wp10_validation/protected_files.txt > output/wp10_validation/protected_after.sha256
          diff -u output/wp10_validation/protected_before.sha256 output/wp10_validation/protected_after.sha256 || status=$?

          python - "$status" <<'PY'
          import json, os, sys
          from datetime import datetime, timezone
          from pathlib import Path
          status_code = int(sys.argv[1])
          payload = {
              'schema_version': 'cockpit_wp10_self_reporting_validation_v1',
              'status': 'success' if status_code == 0 else 'failure',
              'exit_code': status_code,
              'head_sha': os.environ.get('GITHUB_SHA'),
              'run_id': os.environ.get('GITHUB_RUN_ID'),
              'validated_at_utc': datetime.now(timezone.utc).isoformat(),
              'feature_default': 'disabled',
              'email_sent': False,
              'promotion_status': 'not_promoted',
          }
          Path('output/wp10_validation/workflow_result.json').write_text(json.dumps(payload, indent=2, sort_keys=True), encoding='utf-8')
          PY

          cp -R output/cockpit_review output/wp10_validation/cockpit_review 2>/dev/null || true
          git status --short
          exit 0

      - name: Commit code and evidence to validation branch
        run: |
          rm -f .github/workflows/apply-wp10-print-compaction.yml
          rm -f .github/workflows/inspect-wp10-pdf-pages.yml
          rm -f control/triggers/apply_wp10_print_compaction.txt
          rm -f control/triggers/inspect_wp10_pdf_pages.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add runtime/additive_cockpit_front_page.py tools/validate_cockpit_wp10_delivery_integration.py .github/workflows/apply-wp10-print-compaction.yml .github/workflows/inspect-wp10-pdf-pages.yml control/triggers/apply_wp10_print_compaction.txt control/triggers/inspect_wp10_pdf_pages.txt
          git add -f output/wp10_validation
          git commit -m "Validate one-page additive cockpit delivery front page" || exit 0
          git push origin HEAD:feature/cockpit-wp10-additive-delivery-front-page
