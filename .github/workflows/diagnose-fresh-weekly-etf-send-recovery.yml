name: Diagnose fresh Weekly ETF send recovery

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/diagnose-fresh-weekly-etf-send-recovery.yml"
      - "tools/validate_etf_delivery_html_contract.py"
      - "tools/validate_etf_client_surface_clean.py"
      - "tools/validate_etf_macro_thesis_surface_leakage.py"
      - "runtime/client_facing_sanitizer.py"
      - "runtime/report_surface_language_contract.py"
      - "runtime/wp16_followup3_cleanup.py"
      - "tests/test_report_surface_internal_language_cleanup.py"
      - "control/work_packages/WP_FRESH_WEEKLY_ETF_SEND_RECOVERY_20260717.md"
      - "control/work_package_claims/WP_FRESH_WEEKLY_ETF_SEND_RECOVERY_20260717.md"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: .
      MRKT_RPRTS_EXPLICIT_REPORT_PATH: output/weekly_analysis_pro_260716_02.md
      MRKT_RPRTS_EXPLICIT_REPORT_PATH_NL: output/weekly_analysis_pro_nl_260716_02.md
      MRKT_RPRTS_RUNTIME_STATE_PATH: output/runtime/etf_report_state_20260716_20260717_154351_executed.json
      ETF_RUNTIME_STATE_PATH: output/runtime/etf_report_state_20260716_20260717_154351_executed.json
      MRKT_RPRTS_PRICING_AUDIT_PATH: output/pricing/price_audit_2026-07-16_20260717_154351.json
      ETF_PRICING_AUDIT_PATH: output/pricing/price_audit_2026-07-16_20260717_154351.json
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install focused dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest matplotlib mistune markdown weasyprint pyyaml pandas pillow beautifulsoup4 lxml premailer jsonschema

      - name: Snapshot protected authority files
        run: |
          sha256sum \
            output/etf_portfolio_state.json \
            output/etf_trade_ledger.csv \
            output/etf_valuation_history.csv \
            > /tmp/fresh-send-authority-before.sha256

      - name: Run focused language regressions
        run: |
          pytest -q tests/test_report_surface_internal_language_cleanup.py

      - name: Validate whole-share state and execution artifact
        run: |
          python tools/validate_etf_whole_share_contract.py \
            --portfolio-state output/etf_portfolio_state.json \
            --artifact output/runtime/etf_model_execution_20260716_20260717_154351.json
          python tools/validate_etf_trade_ledger_idempotency.py \
            --trade-ledger output/etf_trade_ledger.csv

      - name: Validate delivery HTML contract
        run: |
          set -o pipefail
          python tools/validate_etf_delivery_html_contract.py --output-dir output \
            2>&1 | tee /tmp/fresh-send-delivery-contract.log

      - name: Apply and validate client-surface cleanup
        run: |
          set -o pipefail
          python tools/validate_etf_client_surface_clean.py --output-dir output \
            2>&1 | tee /tmp/fresh-send-client-surface.log

      - name: Validate macro-thesis leakage contract
        run: |
          set -o pipefail
          python tools/validate_etf_macro_thesis_surface_leakage.py --output-dir output \
            2>&1 | tee /tmp/fresh-send-macro-leakage.log

      - name: Prove protected authority unchanged
        run: |
          sha256sum \
            output/etf_portfolio_state.json \
            output/etf_trade_ledger.csv \
            output/etf_valuation_history.csv \
            > /tmp/fresh-send-authority-after.sha256
          diff -u /tmp/fresh-send-authority-before.sha256 /tmp/fresh-send-authority-after.sha256
          git diff --exit-code -- \
            output/etf_portfolio_state.json \
            output/etf_trade_ledger.csv \
            output/etf_valuation_history.csv

      - name: Record cleaned report diff
        if: always()
        run: |
          git diff -- \
            output/weekly_analysis_pro_260716_02.md \
            output/weekly_analysis_pro_nl_260716_02.md \
            output/weekly_analysis_pro_260716_02_delivery.html \
            output/weekly_analysis_pro_nl_260716_02_delivery.html \
            > /tmp/fresh-send-cleaned-report.diff || true

      - name: Upload recovery evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fresh-send-recovery-evidence-${{ github.run_id }}
          path: |
            /tmp/fresh-send-delivery-contract.log
            /tmp/fresh-send-client-surface.log
            /tmp/fresh-send-macro-leakage.log
            /tmp/fresh-send-authority-before.sha256
            /tmp/fresh-send-authority-after.sha256
            /tmp/fresh-send-cleaned-report.diff
          if-no-files-found: warn
          retention-days: 30
