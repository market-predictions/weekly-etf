name: Render ETF cockpit preview

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  render-cockpit-preview:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: .
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Compile cockpit renderer
        run: |
          python -m py_compile runtime/render_cockpit_front_page.py

      - name: Run cockpit preview tests
        run: |
          pytest tests/test_cockpit_front_page_preview.py tests/test_cockpit_preview_workflow.py

      - name: Render cockpit preview HTML
        run: |
          python -m runtime.render_cockpit_front_page --output-dir output --html-only
          test -d output/cockpit_preview
          find output/cockpit_preview -maxdepth 1 -type f -name "*.html" -print | tee /tmp/cockpit-preview-files.txt
          test -s /tmp/cockpit-preview-files.txt

      - name: Upload cockpit preview artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cockpit-preview
          path: output/cockpit_preview/
          if-no-files-found: error
