name: Validate ETF macro compliance

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "MACRO_METHODOLOGY.md"
      - "runtime/macro_report_surface.py"
      - "tools/validate_macro_compliance.py"
      - "tools/validate_macro_report_surface.py"
      - "tools/validate_etf_macro_thesis_surface_leakage.py"
      - "fixtures/macro_compliance/**"
      - ".github/workflows/validate-macro-compliance.yml"

permissions:
  contents: read

jobs:
  validate-macro-compliance:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run macro compliance self-test
        run: |
          python tools/validate_macro_compliance.py --self-test

      - name: Run macro report surface self-test
        run: |
          python tools/validate_macro_report_surface.py --self-test

      - name: Validate current macro report surface if pack exists
        run: |
          if [ -f output/macro/latest.json ]; then
            python tools/validate_macro_report_surface.py --macro-pack output/macro/latest.json
          else
            echo "ETF_MACRO_REPORT_SURFACE_PACK_SKIPPED | reason=no_output_macro_latest"
          fi

      - name: Validate safe macro fixture
        run: |
          python tools/validate_macro_compliance.py \
            --text fixtures/macro_compliance/safe_macro_note.md

      - name: Validate blocked macro fixture behavior
        run: |
          python tools/validate_macro_compliance.py \
            --text fixtures/macro_compliance/bad_predictive_macro_note.md \
            --expect-fail
