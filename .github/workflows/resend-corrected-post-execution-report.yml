name: Resend corrected post-execution ETF report

on:
  push:
    branches:
      - main
    paths:
      - "control/run_queue/weekly_etf_report_correction_request_*.md"
  workflow_dispatch:
    inputs:
      request_file:
        description: "Correction request file in control/run_queue"
        required: true
        type: string
      send_confirmation:
        description: "Required guarded correction resend confirmation"
        required: true
        type: choice
        options:
          - not_confirmed
          - confirm_correction_resend

permissions:
  contents: write

concurrency:
  group: weekly-etf-post-execution-correction
  cancel-in-progress: false

jobs:
  correct-and-resend:
    runs-on: ubuntu-latest
    env:
      MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
      MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
      MAIL_TO: ${{ secrets.MAIL_TO }}
      MAIL_TO_NL: ${{ secrets.MAIL_TO_NL }}
      SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      MRKT_RPRTS_REPORT_MODE: pro
      MRKT_RPRTS_SUBJECT_PREFIX: Corrected Weekly ETF Pro Review
      MRKT_RPRTS_SUBJECT_PREFIX_NL: Gecorrigeerde Weekly ETF Pro Review | Nederlands
      MRKT_RPRTS_DRY_RUN_EMAIL: "0"

    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install production report dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            pandas \
            matplotlib \
            seaborn \
            markdown \
            beautifulsoup4 \
            lxml \
            premailer \
            weasyprint \
            pillow \
            requests \
            pyyaml \
            jsonschema \
            yfinance

      - name: Resolve and guard correction request
        id: request
        env:
          DISPATCH_REQUEST_FILE: ${{ inputs.request_file }}
          DISPATCH_CONFIRMATION: ${{ inputs.send_confirmation }}
          BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          if test "$EVENT_NAME" = "workflow_dispatch"; then
            request_file="$DISPATCH_REQUEST_FILE"
            confirmation="$DISPATCH_CONFIRMATION"
          else
            request_file="$(git diff --name-only "$BEFORE_SHA" "$CURRENT_SHA" | grep -E '^control/run_queue/weekly_etf_report_correction_request_.*\.md$' | tail -n 1)"
            confirmation="$(awk -F': *' '$1=="send_confirmation" {print $2; exit}' "$request_file")"
          fi
          test -n "$request_file"
          test -f "$request_file"
          test "$confirmation" = "confirm_correction_resend"

          source_artifact="$(awk -F': *' '$1=="source_artifact" {print $2; exit}' "$request_file")"
          report_token="$(awk -F': *' '$1=="report_token" {print $2; exit}' "$request_file")"
          correction_suffix="$(awk -F': *' '$1=="correction_suffix" {print $2; exit}' "$request_file")"
          original_run_id="$(awk -F': *' '$1=="original_run_id" {print $2; exit}' "$request_file")"
          report_date="$(awk -F': *' '$1=="report_date" {print $2; exit}' "$request_file")"

          test -f "$source_artifact"
          [[ "$report_token" =~ ^[0-9]{6}$ ]]
          [[ "$correction_suffix" =~ ^[0-9]{2}$ ]]
          [[ "$original_run_id" =~ ^[0-9]{8}_[0-9]{6}$ ]]
          [[ "$report_date" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]

          report_en="output/weekly_analysis_pro_${report_token}_${correction_suffix}.md"
          report_nl="output/weekly_analysis_pro_nl_${report_token}_${correction_suffix}.md"
          correction_run_id="$(date -u +%Y%m%d_%H%M%S)"

          {
            echo "REQUEST_FILE=$request_file"
            echo "SOURCE_ARTIFACT=$source_artifact"
            echo "REPORT_TOKEN=$report_token"
            echo "CORRECTION_SUFFIX=$correction_suffix"
            echo "ORIGINAL_RUN_ID=$original_run_id"
            echo "REPORT_DATE=$report_date"
            echo "REPORT_EN=$report_en"
            echo "REPORT_NL=$report_nl"
            echo "CORRECTION_RUN_ID=$correction_run_id"
            echo "MRKT_RPRTS_EXPLICIT_REPORT_PATH=$report_en"
            echo "MRKT_RPRTS_EXPLICIT_REPORT_PATH_NL=$report_nl"
          } >> "$GITHUB_ENV"

          echo "request_file=$request_file" >> "$GITHUB_OUTPUT"
          echo "report_en=$report_en" >> "$GITHUB_OUTPUT"
          echo "report_nl=$report_nl" >> "$GITHUB_OUTPUT"
          echo "correction_run_id=$correction_run_id" >> "$GITHUB_OUTPUT"

      - name: Verify mail configuration
        run: |
          set -euo pipefail
          test -n "$MAIL_USERNAME"
          test -n "$MAIL_PASSWORD"
          test -n "$MAIL_TO"
          test -n "$SMTP_SERVER"
          test -n "$SMTP_PORT"

      - name: Snapshot immutable state and delivery inventory
        run: |
          set -euo pipefail
          mkdir -p /tmp/weekly-etf-correction
          sha256sum output/etf_portfolio_state.json > /tmp/weekly-etf-correction/state-before.sha256
          sha256sum output/etf_trade_ledger.csv > /tmp/weekly-etf-correction/ledger-before.sha256
          find output/delivery -maxdepth 1 -type f -printf '%f\n' | sort > /tmp/weekly-etf-correction/delivery-before.txt
          sha256sum "$SOURCE_ARTIFACT" > /tmp/weekly-etf-correction/source-artifact.sha256

      - name: Rebuild corrected reports from existing execution artifact
        run: |
          set -euo pipefail
          python -m runtime.finalize_executed_etf_report --artifact "$SOURCE_ARTIFACT"
          test -s "$REPORT_EN"
          test -s "$REPORT_NL"

      - name: Prove correction replay did not mutate official state or ledger
        run: |
          set -euo pipefail
          sha256sum -c /tmp/weekly-etf-correction/state-before.sha256
          sha256sum -c /tmp/weekly-etf-correction/ledger-before.sha256

      - name: Validate corrected bilingual report surfaces
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          from runtime.post_execution_report_surface import validate_post_execution_report_consistency

          artifact = json.loads(Path(os.environ['SOURCE_ARTIFACT']).read_text(encoding='utf-8'))
          state_path = Path(str(artifact['post_execution_state_artifact']))
          state = json.loads(state_path.read_text(encoding='utf-8'))
          en = Path(os.environ['REPORT_EN']).read_text(encoding='utf-8')
          nl = Path(os.environ['REPORT_NL']).read_text(encoding='utf-8')
          validate_post_execution_report_consistency(en, state, language='en')
          validate_post_execution_report_consistency(nl, state, language='nl')
          print('ETF_CORRECTION_REPORT_SURFACE_OK | languages=EN,NL | mutation=URNM->XBI')
          PY

      - name: Render and send corrected English and Dutch reports
        run: |
          set -euo pipefail
          python send_report_runtime_html.py 2>&1 | tee /tmp/weekly-etf-correction/delivery.log
          grep -q "DELIVERY_OK | mode=pro_bilingual" /tmp/weekly-etf-correction/delivery.log

      - name: Prove delivery rendering did not mutate official state or ledger
        run: |
          set -euo pipefail
          sha256sum -c /tmp/weekly-etf-correction/state-before.sha256
          sha256sum -c /tmp/weekly-etf-correction/ledger-before.sha256

      - name: Write correction manifest
        run: |
          set -euo pipefail
          find output/delivery -maxdepth 1 -type f -printf '%f\n' | sort > /tmp/weekly-etf-correction/delivery-after.txt
          comm -13 /tmp/weekly-etf-correction/delivery-before.txt /tmp/weekly-etf-correction/delivery-after.txt > /tmp/weekly-etf-correction/new-delivery-files.txt
          python - <<'PY'
          import hashlib
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          def sha256(path: Path) -> str:
              digest = hashlib.sha256()
              with path.open('rb') as handle:
                  for chunk in iter(lambda: handle.read(1024 * 1024), b''):
                      digest.update(chunk)
              return digest.hexdigest()

          root = Path('.')
          state = root / 'output/etf_portfolio_state.json'
          ledger = root / 'output/etf_trade_ledger.csv'
          source = root / os.environ['SOURCE_ARTIFACT']
          report_en = root / os.environ['REPORT_EN']
          report_nl = root / os.environ['REPORT_NL']
          new_names = [line.strip() for line in Path('/tmp/weekly-etf-correction/new-delivery-files.txt').read_text(encoding='utf-8').splitlines() if line.strip()]
          new_delivery = [str(Path('output/delivery') / name) for name in new_names]
          delivery_manifests = []
          delivery_statuses = []
          for raw in new_delivery:
              path = Path(raw)
              if path.suffix != '.json':
                  continue
              try:
                  payload = json.loads(path.read_text(encoding='utf-8'))
              except Exception:
                  continue
              if 'delivery_status' in payload:
                  delivery_manifests.append(raw)
                  delivery_statuses.append(payload.get('delivery_status'))

          before_state = Path('/tmp/weekly-etf-correction/state-before.sha256').read_text(encoding='utf-8').split()[0]
          before_ledger = Path('/tmp/weekly-etf-correction/ledger-before.sha256').read_text(encoding='utf-8').split()[0]
          manifest = {
              'schema_version': '1.0',
              'correction_type': 'post_execution_report_surface_correction',
              'created_at_utc': datetime.now(timezone.utc).isoformat(),
              'correction_run_id': os.environ['CORRECTION_RUN_ID'],
              'original_run_id': os.environ['ORIGINAL_RUN_ID'],
              'report_date': os.environ['REPORT_DATE'],
              'request_file': os.environ['REQUEST_FILE'],
              'source_execution_artifact': os.environ['SOURCE_ARTIFACT'],
              'source_execution_artifact_sha256': sha256(source),
              'model_execution_replayed': False,
              'official_state_mutated': False,
              'official_trade_ledger_mutated': False,
              'state_sha256_before': before_state,
              'state_sha256_after': sha256(state),
              'trade_ledger_sha256_before': before_ledger,
              'trade_ledger_sha256_after': sha256(ledger),
              'corrected_report_en': os.environ['REPORT_EN'],
              'corrected_report_en_sha256': sha256(report_en),
              'corrected_report_nl': os.environ['REPORT_NL'],
              'corrected_report_nl_sha256': sha256(report_nl),
              'new_delivery_files': new_delivery,
              'delivery_manifests': delivery_manifests,
              'delivery_statuses': delivery_statuses,
              'delivery_log_status': 'DELIVERY_OK',
              'email_receipt_status': 'not_checked_by_workflow',
              'status': 'correction_rendered_and_delivery_layer_completed',
          }
          if manifest['state_sha256_before'] != manifest['state_sha256_after']:
              raise SystemExit('Correction mutated official portfolio state')
          if manifest['trade_ledger_sha256_before'] != manifest['trade_ledger_sha256_after']:
              raise SystemExit('Correction mutated official trade ledger')
          if len(delivery_manifests) < 2:
              raise SystemExit('Expected English and Dutch delivery manifests')
          if any(status != 'smtp_sendmail_returned_no_exception' for status in delivery_statuses):
              raise SystemExit(f'Unexpected delivery statuses: {delivery_statuses}')
          out = Path('output/delivery') / f"weekly_etf_correction_manifest_{os.environ['REPORT_DATE']}_{os.environ['CORRECTION_RUN_ID']}.json"
          out.write_text(json.dumps(manifest, indent=2), encoding='utf-8')
          print(f'ETF_CORRECTION_MANIFEST_OK | path={out} | delivery_manifests={len(delivery_manifests)}')
          PY

      - name: Persist corrected reports and delivery evidence
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f \
            output/weekly_analysis_pro_${REPORT_TOKEN}_${CORRECTION_SUFFIX}* \
            output/weekly_analysis_pro_nl_${REPORT_TOKEN}_${CORRECTION_SUFFIX}* \
            output/delivery/*.json
          if git diff --cached --quiet; then
            echo "No correction artifacts changed"
            exit 1
          fi
          git commit -m "Persist corrected Weekly ETF report delivery evidence [skip ci]"
          git push origin HEAD:main
