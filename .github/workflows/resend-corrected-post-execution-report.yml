name: Post-execution ETF correction runbook

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Runbook mode"
        required: true
        type: choice
        options:
          - validate_only
          - recover_no_send
          - send
        default: validate_only
      request_file:
        description: "Correction request file in control/run_queue"
        required: true
        type: string
        default: control/run_queue/weekly_etf_report_correction_request_20260715_230541.md
      send_confirmation:
        description: "Required only for guarded send"
        required: true
        type: choice
        options:
          - not_confirmed
          - confirm_correction_resend
        default: not_confirmed
      prior_delivery_receipt_path:
        description: "Persisted text receipt used only by recover_no_send"
        required: false
        type: string
        default: output/delivery/weekly_etf_correction_delivery_receipt_2026-07-14_29455717158.txt
      prior_workflow_run_id:
        description: "Original successful delivery workflow run id for recovery evidence"
        required: false
        type: string
        default: "29455717158"

permissions:
  contents: write

concurrency:
  group: weekly-etf-post-execution-correction
  cancel-in-progress: false

jobs:
  correction-runbook:
    runs-on: ubuntu-latest
    env:
      ETF_CORRECTION_REQUEST_FILE: ${{ inputs.request_file }}
      ETF_CORRECTION_SEND_CONFIRMATION: ${{ inputs.send_confirmation }}
      ETF_PRIOR_CORRECTION_DELIVERY_LOG: ${{ inputs.prior_delivery_receipt_path }}
      ETF_PRIOR_CORRECTION_WORKFLOW_RUN_ID: ${{ inputs.prior_workflow_run_id }}
      MRKT_RPRTS_SMTP_HOST: ${{ secrets.MRKT_RPRTS_SMTP_HOST }}
      MRKT_RPRTS_SMTP_PORT: ${{ secrets.MRKT_RPRTS_SMTP_PORT }}
      MRKT_RPRTS_SMTP_USER: ${{ secrets.MRKT_RPRTS_SMTP_USER }}
      MRKT_RPRTS_SMTP_PASS: ${{ secrets.MRKT_RPRTS_SMTP_PASS }}
      MRKT_RPRTS_MAIL_FROM: ${{ secrets.MRKT_RPRTS_MAIL_FROM }}
      MRKT_RPRTS_MAIL_TO: ${{ secrets.MRKT_RPRTS_MAIL_TO }}
      MRKT_RPRTS_MAIL_TO_NL: ${{ secrets.MRKT_RPRTS_MAIL_TO_NL }}

    steps:
      - name: Check out selected ref
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system packages for PDF rendering
        if: inputs.mode != 'validate_only'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcairo2 \
            libpango-1.0-0 \
            libgdk-pixbuf-2.0-0 \
            libffi-dev \
            shared-mime-info \
            fonts-liberation \
            fonts-dejavu-core \
            fonts-lato \
            poppler-utils

      - name: Install validation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pyyaml

      - name: Install production report dependencies
        if: inputs.mode != 'validate_only'
        run: |
          python -m pip install \
            pandas \
            matplotlib \
            seaborn \
            markdown \
            mistune \
            beautifulsoup4 \
            lxml \
            premailer \
            weasyprint \
            pillow \
            requests \
            jsonschema \
            yfinance

      - name: Guard runbook mode
        run: |
          set -euo pipefail
          test -f "$ETF_CORRECTION_REQUEST_FILE"
          case "${{ inputs.mode }}" in
            validate_only)
              test "${{ inputs.send_confirmation }}" = "not_confirmed"
              ;;
            recover_no_send)
              test "${{ inputs.send_confirmation }}" = "not_confirmed"
              test -n "$ETF_PRIOR_CORRECTION_DELIVERY_LOG"
              test -f "$ETF_PRIOR_CORRECTION_DELIVERY_LOG"
              ;;
            send)
              test "${{ inputs.send_confirmation }}" = "confirm_correction_resend"
              ;;
            *)
              echo "Unsupported correction mode" >&2
              exit 1
              ;;
          esac

      - name: Compile correction runbook
        run: |
          python -m py_compile \
            runtime/post_execution_correction_runbook.py \
            runtime/run_post_execution_correction_delivery.py \
            runtime/recover_post_execution_correction_evidence.py \
            tools/validate_post_execution_correction_runbook.py

      - name: Run focused correction-runbook tests
        run: pytest -q tests/test_post_execution_correction_runbook.py

      - name: Validate canonical runbook and historical evidence
        run: python -m tools.validate_post_execution_correction_runbook

      - name: Verify production mail configuration
        if: inputs.mode == 'send'
        run: |
          set -euo pipefail
          test -n "$MRKT_RPRTS_SMTP_HOST"
          test -n "$MRKT_RPRTS_SMTP_PORT"
          test -n "$MRKT_RPRTS_SMTP_USER"
          test -n "$MRKT_RPRTS_SMTP_PASS"
          test -n "$MRKT_RPRTS_MAIL_FROM"
          test -n "$MRKT_RPRTS_MAIL_TO"
          test -n "$MRKT_RPRTS_MAIL_TO_NL"

      - name: Execute guarded correction send
        if: inputs.mode == 'send'
        run: python -m runtime.run_post_execution_correction_delivery

      - name: Recover evidence without SMTP
        if: inputs.mode == 'recover_no_send'
        env:
          MRKT_RPRTS_SMTP_HOST: ""
          MRKT_RPRTS_SMTP_PORT: ""
          MRKT_RPRTS_SMTP_USER: ""
          MRKT_RPRTS_SMTP_PASS: ""
          MRKT_RPRTS_MAIL_FROM: ""
          MRKT_RPRTS_MAIL_TO: ""
          MRKT_RPRTS_MAIL_TO_NL: ""
        run: python -m runtime.recover_post_execution_correction_evidence

      - name: Prove official authority files are unchanged
        run: |
          git diff --exit-code -- output/etf_portfolio_state.json output/etf_trade_ledger.csv

      - name: Upload runbook evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: post-execution-correction-runbook-${{ github.run_id }}
          path: |
            output/weekly_analysis_pro_*_*.md
            output/weekly_analysis_pro_*_*.pdf
            output/weekly_analysis_pro_*_*_delivery.html
            output/weekly_analysis_pro_*_*_equity_curve.png
            output/delivery/weekly_etf_correction_*.json
            output/delivery/weekly_etf_correction_*.txt
          if-no-files-found: warn
          retention-days: 30

      - name: Persist newly produced correction evidence
        if: inputs.mode == 'send' || inputs.mode == 'recover_no_send'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f \
            output/weekly_analysis_pro_${ETF_CORRECTION_REQUEST_FILE##*request_}* 2>/dev/null || true
          git add -f \
            output/weekly_analysis_pro_*_* \
            output/weekly_analysis_pro_nl_*_* \
            output/delivery/weekly_etf_correction_*.json \
            output/delivery/weekly_etf_correction_*.txt
          git reset -- output/etf_portfolio_state.json output/etf_trade_ledger.csv || true
          if git diff --cached --quiet; then
            echo "No new correction evidence to persist"
            exit 0
          fi
          git commit -m "Persist post-execution correction evidence [skip ci]"
          git push origin HEAD:${GITHUB_REF_NAME}
