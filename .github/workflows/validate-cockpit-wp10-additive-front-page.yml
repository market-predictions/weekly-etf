name: Validate cockpit WP10 additive front page

on:
  pull_request:
    branches:
      - main
    paths:
      - "runtime/additive_cockpit_front_page.py"
      - "send_report_runtime_html.py"
      - "tests/test_cockpit_wp10_additive_delivery_front_page.py"
      - "tools/validate_cockpit_wp10_delivery_integration.py"
      - ".github/workflows/validate-cockpit-wp10-additive-front-page.yml"
      - ".github/workflows/send-weekly-report.yml"
      - "control/work_packages/WP_COCKPIT_SURFACE_10_ADDITIVE_DELIVERY_FRONT_PAGE_20260717.md"
      - "control/handovers/HANDOVER_COCKPIT_SURFACE_10_ADDITIVE_DELIVERY_FRONT_PAGE_20260717.md"
      - "control/evidence/COCKPIT_WP10_ADDITIVE_DELIVERY_FRONT_PAGE_EVIDENCE_20260717.json"
      - "control/evidence/COCKPIT_WP11_PRODUCTION_ENABLEMENT_EVIDENCE_20260717.json"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: .
      MRKT_RPRTS_COCKPIT_FRONT_PAGE: disabled
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install render and validation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            pytest \
            pandas \
            matplotlib \
            seaborn \
            markdown \
            mistune \
            beautifulsoup4 \
            lxml \
            premailer \
            weasyprint \
            pillow \
            requests \
            pyyaml \
            jsonschema \
            yfinance \
            pypdf

      - name: Snapshot protected authority files
        run: |
          set -euo pipefail
          files=(
            output/etf_portfolio_state.json
            output/etf_trade_ledger.csv
            output/etf_valuation_history.csv
            output/etf_recommendation_scorecard.csv
            output/runtime/latest_etf_report_state_path.txt
            output/pricing/latest_price_audit_path.txt
            output/run_manifests/latest_weekly_etf_run_manifest_path.txt
          )
          for pointer in \
            output/runtime/latest_etf_report_state_path.txt \
            output/pricing/latest_price_audit_path.txt \
            output/run_manifests/latest_weekly_etf_run_manifest_path.txt
          do
            if [ -s "$pointer" ]; then
              target="$(cat "$pointer")"
              if [ -f "$target" ]; then
                files+=("$target")
              fi
            fi
          done
          printf '%s\n' "${files[@]}" | sort -u > /tmp/wp10-protected-files.txt
          xargs -d '\n' sha256sum < /tmp/wp10-protected-files.txt > /tmp/wp10-protected-before.sha256

      - name: Compile WP10 modules
        run: |
          python -m py_compile \
            runtime/additive_cockpit_front_page.py \
            send_report_runtime_html.py \
            tools/validate_cockpit_wp10_delivery_integration.py \
            tests/test_cockpit_wp10_additive_delivery_front_page.py

      - name: Run focused and existing regressions
        run: |
          pytest -q \
            tests/test_cockpit_wp10_additive_delivery_front_page.py \
            tests/test_cockpit_front_page_preview.py \
            tests/test_cockpit_visual_state_contracts.py \
            tests/test_cockpit_current_runtime_authority.py \
            tests/test_cockpit_side_by_side_review.py \
            tests/test_cockpit_wp08_evidence_review.py \
            tests/test_cockpit_wp09_client_surface_refinement.py

      - name: Validate production report contracts
        run: |
          python tools/validate_etf_delivery_html_contract.py --output-dir output
          python tools/validate_etf_macro_thesis_surface_leakage.py --output-dir output

      - name: Verify persistent WP10 implementation evidence
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path("control/evidence/COCKPIT_WP10_ADDITIVE_DELIVERY_FRONT_PAGE_EVIDENCE_20260717.json")
          payload = json.loads(path.read_text(encoding="utf-8"))
          assert payload["schema_version"] == "cockpit_wp10_additive_delivery_front_page_evidence_v1"
          assert payload["implementation_status"] == "validated_ready_for_enablement_decision"
          assert payload["feature_default"] == "disabled"
          assert payload["disabled_html_byte_identical"] == {"en": True, "nl": True}
          assert payload["enabled_front_page_count"] == {"en": 1, "nl": 1}
          assert payload["front_page_pdf_pages"] == {"en": 1, "nl": 1}
          assert payload["classic_report_body"] == "preserved"
          assert payload["small_decision_cockpit_duplicate"] is False
          assert payload["email_count_change"] is False
          assert payload["pdf_count_change"] is False
          assert payload["attachment_contract_change"] is False
          assert payload["manifest_contract_change"] is False
          assert payload["email_sent"] is False
          assert payload["promotion_status"] == "not_promoted"
          PY

      - name: Verify superseding WP11 exact-current production evidence
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          workflow = Path(".github/workflows/send-weekly-report.yml").read_text(encoding="utf-8")
          enabled = "MRKT_RPRTS_COCKPIT_FRONT_PAGE: enabled" in workflow
          evidence_path = Path("control/evidence/COCKPIT_WP11_PRODUCTION_ENABLEMENT_EVIDENCE_20260717.json")
          if enabled:
              payload = json.loads(evidence_path.read_text(encoding="utf-8"))
              assert payload["schema_version"] == "cockpit_wp11_production_enablement_evidence_v1"
              assert payload["selected_option"] == "B_enable_additive_delivery_front_page"
              assert payload["production_feature"]["value"] == "enabled"
              assert payload["production_feature"]["rollback_value"] == "disabled"
              assert payload["exact_current_authority"]["whole_share_status"] == "compliant"
              assert payload["exact_current_authority"]["position_count"] == 8
              for language in ("en", "nl"):
                  row = payload["languages"][language]
                  assert row["enabled_front_page_count"] == 1
                  assert row["pdf_page_delta"] == 1
                  assert row["classic_report_body"] == "preserved"
                  assert row["enabled_small_decision_cockpit_count"] == 0
              assert payload["delivery_contract"]["email_sent"] is False
              assert payload["authority_contract"]["protected_hashes_before_after"] == "identical"
          PY

      - name: Prove authority files unchanged
        run: |
          set -euo pipefail
          xargs -d '\n' sha256sum < /tmp/wp10-protected-files.txt > /tmp/wp10-protected-after.sha256
          diff -u /tmp/wp10-protected-before.sha256 /tmp/wp10-protected-after.sha256
          sha256sum -c /tmp/wp10-protected-before.sha256
          git diff --exit-code -- \
            output/etf_portfolio_state.json \
            output/etf_trade_ledger.csv \
            output/etf_valuation_history.csv \
            output/etf_recommendation_scorecard.csv \
            output/runtime/latest_etf_report_state_path.txt \
            output/pricing/latest_price_audit_path.txt \
            output/run_manifests/latest_weekly_etf_run_manifest_path.txt

      - name: Upload WP10 compatibility evidence
        uses: actions/upload-artifact@v4
        with:
          name: cockpit-wp10-compatibility-${{ github.run_id }}
          path: |
            control/evidence/COCKPIT_WP10_ADDITIVE_DELIVERY_FRONT_PAGE_EVIDENCE_20260717.json
            control/evidence/COCKPIT_WP11_PRODUCTION_ENABLEMENT_EVIDENCE_20260717.json
            /tmp/wp10-protected-files.txt
            /tmp/wp10-protected-before.sha256
            /tmp/wp10-protected-after.sha256
          if-no-files-found: error
          retention-days: 14
