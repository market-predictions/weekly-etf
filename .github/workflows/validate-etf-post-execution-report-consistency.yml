name: Validate ETF post-execution report consistency

on:
  pull_request:
    branches:
      - main
    paths:
      - "runtime/post_execution_report_surface.py"
      - "runtime/polish_runtime_reports.py"
      - "runtime/fix_report_output_contract.py"
      - "runtime/render_etf_report_from_state.py"
      - "runtime/render_etf_report_nl_from_state.py"
      - "runtime/fix_executed_report_contract.py"
      - "tests/test_etf_post_execution_report_consistency.py"
      - "tools/apply_post_execution_report_consistency_patch.py"
      - ".github/workflows/validate-etf-post-execution-report-consistency.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Apply staged post-execution surface patch
        id: staged_patch
        run: |
          if test -f tools/apply_post_execution_report_consistency_patch.py; then
            python tools/apply_post_execution_report_consistency_patch.py
            echo "applied=true" >> "$GITHUB_OUTPUT"
          else
            echo "applied=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install focused test dependencies
        run: python -m pip install pytest

      - name: Compile post-execution report implementation
        run: |
          python -m py_compile \
            runtime/post_execution_report_surface.py \
            runtime/polish_runtime_reports.py \
            runtime/fix_report_output_contract.py \
            runtime/render_etf_report_from_state.py \
            runtime/render_etf_report_nl_from_state.py \
            runtime/fix_executed_report_contract.py

      - name: Test executed action buckets
        continue-on-error: true
        run: python -m pytest -q tests/test_etf_post_execution_report_consistency.py::test_action_buckets_exclude_changed_positions_from_hold

      - name: Test executed action labels
        continue-on-error: true
        run: python -m pytest -q tests/test_etf_post_execution_report_consistency.py::test_executed_action_labels_override_stale_suggested_action

      - name: Test dynamic takeaway and cockpit
        continue-on-error: true
        run: python -m pytest -q tests/test_etf_post_execution_report_consistency.py::test_dynamic_takeaway_and_cockpit_describe_execution

      - name: Test final action tables
        continue-on-error: true
        run: python -m pytest -q tests/test_etf_post_execution_report_consistency.py::test_final_action_tables_use_executed_labels

      - name: Test coherent bilingual report validation
        continue-on-error: true
        run: python -m pytest -q tests/test_etf_post_execution_report_consistency.py::test_consistency_validator_accepts_coherent_english_and_dutch

      - name: Test no-action contradiction rejection
        continue-on-error: true
        run: python -m pytest -q tests/test_etf_post_execution_report_consistency.py::test_consistency_validator_rejects_no_action_wording

      - name: Test wrong-bucket rejection
        continue-on-error: true
        run: python -m pytest -q tests/test_etf_post_execution_report_consistency.py::test_consistency_validator_rejects_wrong_action_bucket

      - name: Test linkified ticker validation
        continue-on-error: true
        run: python -m pytest -q tests/test_etf_post_execution_report_consistency.py::test_consistency_validator_accepts_linkified_final_action_tickers

      - name: Run focused regression tests
        run: python -m pytest -q tests/test_etf_post_execution_report_consistency.py

      - name: Record official state and ledger hashes
        run: |
          sha256sum output/etf_portfolio_state.json > /tmp/state-before.sha256
          sha256sum output/etf_trade_ledger.csv > /tmp/ledger-before.sha256

      - name: Replay exact executed artifact without model re-execution
        env:
          MRKT_RPRTS_EXPLICIT_REPORT_PATH: /tmp/weekly_analysis_pro_260714_03.md
          MRKT_RPRTS_EXPLICIT_REPORT_PATH_NL: /tmp/weekly_analysis_pro_nl_260714_03.md
        run: |
          python -m runtime.finalize_executed_etf_report \
            --artifact output/runtime/etf_model_execution_20260714_20260715_175910.json

      - name: Prove correction replay did not mutate official state or ledger
        run: |
          sha256sum -c /tmp/state-before.sha256
          sha256sum -c /tmp/ledger-before.sha256

      - name: Assert exact English and Dutch executed-state surfaces
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          state = json.loads(Path('output/runtime/etf_report_state_20260714_20260715_175910_executed.json').read_text(encoding='utf-8'))
          en = Path('/tmp/weekly_analysis_pro_260714_03.md').read_text(encoding='utf-8')
          nl = Path('/tmp/weekly_analysis_pro_nl_260714_03.md').read_text(encoding='utf-8')

          from runtime.post_execution_report_surface import validate_post_execution_report_consistency
          validate_post_execution_report_consistency(en, state, language='en')
          validate_post_execution_report_consistency(nl, state, language='nl')

          checks = {
              'en_cockpit_execution': 'Guarded model rotation executed and persisted' in en,
              'nl_cockpit_execution': 'Bewaakte modelrotatie uitgevoerd en verwerkt' in nl,
              'en_urnm_reduce': 'Reduce — executed' in en and 'URNM' in en,
              'en_xbi_add': 'Add — executed' in en and 'XBI' in en,
              'nl_urnm_reduce': 'Verlagen — uitgevoerd' in nl and 'URNM' in nl,
              'nl_xbi_add': 'Toevoegen — uitgevoerd' in nl and 'XBI' in nl,
              'en_section14_urnm_shares': '-105.86' in en,
              'en_section14_xbi_shares': '35.63' in en,
              'nl_section14_urnm_shares': '-105.86' in nl,
              'nl_section14_xbi_shares': '35.63' in nl,
              'en_no_contradiction': 'no portfolio action' not in en.lower(),
              'nl_no_contradiction': 'geen portefeuilleactie' not in nl.lower(),
          }
          failed = [name for name, passed in checks.items() if not passed]
          if failed:
              raise SystemExit('Post-execution report proof failed: ' + ', '.join(failed))
          print('ETF_POST_EXECUTION_REPORT_CONSISTENCY_OK | changes=2 | source=URNM | destination=XBI | languages=EN,NL')
          PY

      - name: Upload corrected report replay evidence
        uses: actions/upload-artifact@v4
        with:
          name: corrected-post-execution-etf-reports
          path: |
            /tmp/weekly_analysis_pro_260714_03.md
            /tmp/weekly_analysis_pro_nl_260714_03.md
          if-no-files-found: error
          retention-days: 30

      - name: Commit validated staged implementation
        if: steps.staged_patch.outputs.applied == 'true'
        run: |
          rm -f tools/apply_post_execution_report_consistency_patch.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            runtime/polish_runtime_reports.py \
            runtime/fix_report_output_contract.py \
            runtime/render_etf_report_from_state.py \
            runtime/render_etf_report_nl_from_state.py \
            runtime/fix_executed_report_contract.py
          git add -u tools/apply_post_execution_report_consistency_patch.py
          git commit -m "Integrate post-execution report consistency authority [post-execution-surface]"
          git push origin HEAD:${{ github.head_ref || github.ref_name }}
