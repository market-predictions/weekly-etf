name: Apply ETF runtime lineage context fix v2

on:
  push:
    branches:
      - main
    paths:
      - "control/run_queue/weekly_etf_lineage_context_fix_v2_*.md"

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Apply minimal run-identity fix and regression
        shell: bash
        run: |
          echo '' | base64 -d > /tmp/apply_fix.py
          python /tmp/apply_fix.py
      - name: Run focused validation
        run: |
          python -m pip install pytest
          python -m py_compile runtime/build_etf_report_state.py runtime/trade_lineage.py
          python -m pytest -q tests/test_etf_trade_lineage.py tests/test_etf_stale_trade_lineage_reset.py tests/test_etf_runtime_lineage_context.py
      - name: Commit validated fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add runtime/build_etf_report_state.py tests/test_etf_runtime_lineage_context.py
          git commit -m "Fix ETF runtime lineage across report runs"
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then exit 0; fi
            git pull --rebase origin main
          done
          exit 1
