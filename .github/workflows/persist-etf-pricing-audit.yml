name: Persist ETF pricing audit

on:
  workflow_dispatch:
    inputs:
      requested_close_date:
        description: "Close date to price, YYYY-MM-DD. Leave empty for latest completed weekday."
        required: false
        type: string
  push:
    branches:
      - main
    paths:
      - "control/run_queue/etf_pricing_request_*.md"
      - "pricing/**"
      - ".github/workflows/persist-etf-pricing-audit.yml"

permissions:
  contents: write

jobs:
  persist-pricing-audit:
    runs-on: ubuntu-latest

    if: |
      github.event_name == 'workflow_dispatch' ||
      !contains(github.event.head_commit.message, '[pricing-audit]')

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Run pricing pass and write audit
        env:
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
        run: |
          if [ -n "${{ inputs.requested_close_date }}" ]; then
            python -m pricing.run_pricing_pass --requested-close-date "${{ inputs.requested_close_date }}"
          else
            python -m pricing.run_pricing_pass
          fi

      - name: Validate persisted audit shape
        run: |
          python pricing/validate_persisted_audit.py --allow-prior-run-date

      - name: Commit pricing audit if changed
        run: |
          if git diff --quiet -- output/pricing; then
            echo "PRICING_AUDIT_UNCHANGED | no commit needed"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/pricing/*.json
          git commit -m "[pricing-audit] Persist ETF pricing audit"
          git push
          echo "PRICING_AUDIT_COMMITTED"
