name: Validate ETF lane breadth

on:
  push:
    branches:
      - main
    paths:
      - "output/weekly_analysis_pro_*.md"
      - "output/lane_reviews/etf_lane_assessment_*.json"
  workflow_dispatch:

jobs:
  validate-lane-breadth:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate matching ETF lane breadth artifact
        run: |
          python validate_lane_breadth.py
